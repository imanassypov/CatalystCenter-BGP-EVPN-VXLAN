# Primary metrics index
[evpn_index]
definition = index=evpn_assurance

# Default lookback window for mstats panels
[evpn_lb]
definition = earliest=-15m latest=now

# Convenience macro: resolve device metadata from the OTel yang_grpc device key.
# The yang_grpc receiver tags every metric with dimension `cisco.node_id` (e.g.
# "Spine-01"), which matches the CSV `hostname` column. (The Splunk `source`
# field is "http:Cisco MDT" for all HEC metrics and is NOT the device.)
# Run AFTER an mstats `BY "cisco.node_id"`. Usage: | `evpn_lookup`
[evpn_lookup]
definition = rename "cisco.node_id" AS hostname | lookup evpn_device_inventory hostname OUTPUT site role ip_address loopback description

# Segment intent from DEFN-OVERLAY / DEFN-CLIENT-PORTS (vlan or l2vni key).
# Usage: | eval access_vlan=tonumber('vlan-id') | `evpn_segment_lookup`
[evpn_segment_lookup]
definition = lookup evpn_segment_inventory vlan AS access_vlan OUTPUT l2vni l3vni vrf segment_name overlay_leaves access_leaves

# Per-device EVPN route-update deltas (Sub 40113) for the dashboard time range.
# Sum per-VNI counters per minute, delta earliest→latest per node, then evpn_lookup.
# Usage (after dashboard tokens): | `evpn_route_update_deltas`
[evpn_route_update_deltas]
definition = mstats latest("cisco.local-add.mac-cnt") AS mac_local_add latest("cisco.local-add.mac-ip-cnt") AS macip_local_add latest("cisco.remote-add.mac-cnt") AS mac_remote_add latest("cisco.remote-add.mac-ip-cnt") AS macip_remote_add latest("cisco.local-add.ip-prefix-cnt") AS t5_local_add latest("cisco.remote-add.ip-prefix-cnt") AS t5_remote_add latest("cisco.local-add.imet-cnt") AS imet_local_add latest("cisco.remote-add.imet-cnt") AS imet_remote_add WHERE `evpn_index` earliest=$timeRange.earliest$ latest=$timeRange.latest$ span=1m "cisco.encoding_path"="Cisco-IOS-XE-evpn-oper:evpn-oper-data/evpn-stats/evpn-vni-rt-cnt" BY "cisco.node_id", vni | stats sum(mac_local_add) AS mac_local_add sum(macip_local_add) AS macip_local_add sum(mac_remote_add) AS mac_remote_add sum(macip_remote_add) AS macip_remote_add sum(t5_local_add) AS t5_local_add sum(t5_remote_add) AS t5_remote_add sum(imet_local_add) AS imet_local_add sum(imet_remote_add) AS imet_remote_add BY _time, "cisco.node_id" | stats earliest(mac_local_add) AS mac_local_s latest(mac_local_add) AS mac_local_e earliest(macip_local_add) AS macip_local_s latest(macip_local_add) AS macip_local_e earliest(mac_remote_add) AS mac_remote_s latest(mac_remote_add) AS mac_remote_e earliest(macip_remote_add) AS macip_remote_s latest(macip_remote_add) AS macip_remote_e earliest(t5_local_add) AS t5_local_s latest(t5_local_add) AS t5_local_e earliest(t5_remote_add) AS t5_remote_s latest(t5_remote_add) AS t5_remote_e earliest(imet_local_add) AS imet_local_s latest(imet_local_add) AS imet_local_e earliest(imet_remote_add) AS imet_remote_s latest(imet_remote_add) AS imet_remote_e BY "cisco.node_id" | eval mac_local_add=if(mac_local_e>=mac_local_s,mac_local_e-mac_local_s,mac_local_e) | eval macip_local_add=if(macip_local_e>=macip_local_s,macip_local_e-macip_local_s,macip_local_e) | eval mac_remote_add=if(mac_remote_e>=mac_remote_s,mac_remote_e-mac_remote_s,mac_remote_e) | eval macip_remote_add=if(macip_remote_e>=macip_remote_s,macip_remote_e-macip_remote_s,macip_remote_e) | eval t5_local_add=if(t5_local_e>=t5_local_s,t5_local_e-t5_local_s,t5_local_e) | eval t5_remote_add=if(t5_remote_e>=t5_remote_s,t5_remote_e-t5_remote_s,t5_remote_e) | eval imet_local_add=if(imet_local_e>=imet_local_s,imet_local_e-imet_local_s,imet_local_e) | eval imet_remote_add=if(imet_remote_e>=imet_remote_s,imet_remote_e-imet_remote_s,imet_remote_e) | `evpn_lookup` | where site="$site$"
