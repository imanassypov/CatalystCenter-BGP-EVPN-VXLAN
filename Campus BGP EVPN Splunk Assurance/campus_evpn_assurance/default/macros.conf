# Primary metrics index
[evpn_index]
definition = index=evpn_assurance

# Default lookback window for mstats panels
[evpn_lb]
definition = earliest=-15m latest=now

# Convenience macro: resolve device metadata from the OTel yang_grpc device key.
# The yang_grpc receiver tags every metric with dimension `cisco.node_id` (e.g.
# "Spine-01"), which matches the CSV `hostname` column. (The Splunk `source`
# field is "http:Cisco MDT" for all HEC metrics and is NOT the device.)
# Run AFTER an mstats `BY "cisco.node_id"`. Usage: | `evpn_lookup`
[evpn_lookup]
definition = rename "cisco.node_id" AS hostname | lookup evpn_device_inventory hostname OUTPUT site role ip_address loopback description
