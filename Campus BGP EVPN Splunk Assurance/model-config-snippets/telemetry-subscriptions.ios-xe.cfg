! -----------------------------------------------------------------------------
! Sub 40115 — NVE Traffic Counters (per-NVE aggregate)
! YANG  : Cisco-IOS-XE-nve-oper
! XPath : /nve-oper-data/nve-oper-counters
! Data  : Per-NVE unicast/multicast input+output packet & byte counters
!         (uc_input_packets/bytes, mc_input_packets/bytes, uc_output_*, mc_output_*)
!         Key dim: unit_number
! Update: periodic 1 min (6000 cs) — traffic-rate trending, per the README
!         "nve counters" recommendation.
!
! NOTE — model placement:
!   nve-oper-counters is a SIBLING of nve-oper under nve-oper-data, so it is NOT
!   covered by subs 40101/40102 (/nve-oper-data/nve-oper). A dedicated sub is
!   required to stream counter data.
! NOTE — no on-change policy:
!   Counters are monotonic and increment on every poll, so an on-change policy
!   would fire continuously and flood the collector. Periodic only.
! Applies to: ALL 6 fabric devices (NVE-bearing VTEPs/borders; spines stream empty)
! STATUS: DEPLOYED + Valid on all 6 fabric devices (2026-06-23). Receiver
!   grpc-tcp://18.224.25.161:57444 Connected/active. Counter metrics
!   (cisco.uc/mc-input/output-packets/bytes) confirmed landing in the
!   evpn_assurance index for all 6 node_ids.
! -----------------------------------------------------------------------------
telemetry ietf subscription 40115
 encoding encode-kvgpb
 filter xpath /nve-oper-data/nve-oper-counters
 stream yang-push
 update-policy periodic 6000
 source-vrf Mgmt-vrf
 receiver ip address 18.224.25.161 57444 protocol grpc-tcp
!

! -----------------------------------------------------------------------------
! Sub 40117 — NVE Per-VNI Traffic Counters
! YANG  : Cisco-IOS-XE-nve-oper
! XPath : /nve-oper-data/nve-oper-counters/nve-vni-oper-counters
! Data  : Per-VNI unicast/multicast input+output packet & byte counters
!         Key dims: vni_id, nve_id
! Update: periodic 1 min (6000 cs) — per-VNI traffic trending (on-change omitted,
!         same reason as 40115).
!
! NOTE — model placement:
!   nve-vni-oper-counters is a CHILD of nve-oper-counters, so it is already
!   carried by sub 40115. This separate sub exists only to allow independent
!   per-VNI cadence/scoping (mirrors the 40101 vs 40103/40105 parent/child split
!   used elsewhere in this file). Drop it if the redundant per-VNI stream from
!   40115 is sufficient.
! Applies to: ALL 6 fabric devices
! STATUS: DEPLOYED + Valid on all 6 fabric devices (2026-06-23). Receiver
!   grpc-tcp://18.224.25.161:57444 Connected/active. Per-VNI counter metrics
!   confirmed landing in the evpn_assurance index (encoding path
!   .../nve-oper-counters/nve-vni-oper-counters).
! -----------------------------------------------------------------------------
telemetry ietf subscription 40117
 encoding encode-kvgpb
 filter xpath /nve-oper-data/nve-oper-counters/nve-vni-oper-counters
 stream yang-push
 update-policy periodic 6000
 source-vrf Mgmt-vrf
 receiver ip address 18.224.25.161 57444 protocol grpc-tcp
!

