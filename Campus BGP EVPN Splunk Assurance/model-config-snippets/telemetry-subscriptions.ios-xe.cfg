! YANG  : Cisco-IOS-XE-bgp-oper
! XPath : /bgp-state-data/address-families/address-family
! Data  : Per-AFI/SAFI counters: router-id, total prefixes, paths, memory
!         Key dims: vrf_name, afi_safi (e.g. vpnv4-unicast, l2vpn-evpn)
! Update: periodic 6000 cs (60 s)
! Applies to: ALL 6 fabric devices
! -----------------------------------------------------------------------------
telemetry ietf subscription 40116
 encoding encode-kvgpb
 filter xpath /bgp-state-data/address-families/address-family
 stream yang-push
 update-policy periodic 6000
 source-vrf Mgmt-vrf
 receiver ip address 18.224.25.161 57444 protocol grpc-tcp
!

! -----------------------------------------------------------------------------
! Sub 40119 — BGP Neighbor State (Control-Plane Health) — on-change fast events
! YANG  : Cisco-IOS-XE-bgp-oper
! XPath : /bgp-state-data/neighbors/neighbor  (same as sub 40114)
! Data  : Same payload as sub 40114. Delivers an immediate event when hold_time
!         drops to 0 on session failure — complements sub 40114 periodic baseline.
! Update: on-change
! Applies to: ALL 6 fabric devices (Spine01/02, Border01/02, Leaf01/02)
!   HISTORY: On IOS-XE 17.18.02 this XPath did NOT support on-change and the
!   subscription entered Invalid state. After upgrade to 26.2.x, on-change is
!   supported and validates on every device including Leaf01 (verified Valid +
!   receiver Connected on 26.02.20260529). If the fabric is ever rolled back to
!   17.18.02, re-exclude the affected devices and rely on sub 40114 periodic.
! -----------------------------------------------------------------------------
telemetry ietf subscription 40119
 encoding encode-kvgpb
 filter xpath /bgp-state-data/neighbors/neighbor
 stream yang-push
 update-policy on-change
 source-vrf Mgmt-vrf
 receiver ip address 18.224.25.161 57444 protocol grpc-tcp
!

! -----------------------------------------------------------------------------
! Sub 40113 — EVPN Route Statistics (per-VNI route counts)
! YANG  : Cisco-IOS-XE-evpn-oper
! XPath : /evpn-oper-data/evpn-stats          <-- parent container (see note)
! Data  : Per-VNI route-type counters under evpn-stats/evpn-vni-rtcnt:
!         local/remote updates+deletes for EAD-EVI, EAD-ES, MAC, MAC/IP, IMET,
!         ES, IP-Prefix. Source CLI: show l2vpn evpn routes [vni|global] summary.
! Update: periodic 6000 cs (60 s)
! Applies to: ALL 6 fabric devices (Valid on 26.2.x; verified 2026-06-22)
!
! IMPORTANT — XPath quirk (do NOT use the leaf-list child path):
!   The specific child path /evpn-oper-data/evpn-stats/evpn-vni-rtcnt is REJECTED
!   as "Invalid XPath filter" by the IOS-XE 26.02 (V262) telemetry validator on
!   this platform — confirmed Invalid on both spines/borders AND a VTEP leaf.
!   The PARENT container /evpn-oper-data/evpn-stats validates (State: Valid,
!   receiver Connected) and carries the same evpn-vni-rtcnt data. Subscribe to
!   the parent container, not the child node.
!   History: on IOS-XE 17.18.02 the entire evpn-stats subtree was unavailable
!   (Invalid). 26.2.x registers the subtree, but only at the container level.
! -----------------------------------------------------------------------------
telemetry ietf subscription 40113
 encoding encode-kvgpb
 filter xpath /evpn-oper-data/evpn-stats
 stream yang-push
 update-policy periodic 6000
 source-vrf Mgmt-vrf
 receiver ip address 18.224.25.161 57444 protocol grpc-tcp
!

