! -----------------------------------------------------------------------------
! Sub 40114 — BGP Neighbor State (Control-Plane Health) — periodic baseline
! YANG  : Cisco-IOS-XE-bgp-oper
! XPath : /bgp-state-data/neighbors/neighbor
! Data  : Per-neighbor negotiated timers (hold_time, keepalive), remote AS,
!         BGP update/prefix counters (updates_rcvd, installed_prefixes, etc.)
!         Key dims: vrf_name, neighbor_id
! Update: periodic 3000 cs (30 s)
!
! NOTE — Session state indicator on IOS-XE:
!   hold_time is set to the negotiated value (typically 180) ONLY while FSM
!   is in Established state; zeroed immediately on session teardown.
!   Splunk session health: ESTABLISHED if hold_time > 0, else DOWN.
!   Metric prefix: Cisco-IOS-XE-bgp-oper:bgp-state-data/neighbors/neighbor.*
!   Dimensions: neighbor_id (peer IP), vrf_name, source
! Applies to: ALL 6 fabric devices
! -----------------------------------------------------------------------------
telemetry ietf subscription 40114
 encoding encode-kvgpb
 filter xpath /bgp-state-data/neighbors/neighbor
 stream yang-push
 update-policy periodic 3000
 source-vrf Mgmt-vrf
 receiver ip address 18.224.25.161 57444 protocol grpc-tcp
!

! -----------------------------------------------------------------------------
