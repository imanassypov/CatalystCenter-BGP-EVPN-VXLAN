! =============================================================================
! IOS-XE MDT Telemetry Subscriptions — Campus BGP EVPN VXLAN Fabric
! =============================================================================
! Collector : 18.224.25.161 (cloud EC2 OTel collector), port 57444 (yang_grpc)
! Protocol  : gRPC dial-out (receiver ip address format — NOT named receiver)
! Encoding  : encode-kvgpb
! Source VRF: Mgmt-vrf (all devices)
! IOS-XE    : Validated on 17.18.02 (Cisco CAT9k)
!
! Applies to: Spine01, Spine02, Leaf01, Leaf02, Border01, Border02
!             (all 6 fabric devices)
!
! IMPORTANT — IOS-XE XPath rules:
!   - Do NOT prefix XPath with module namespace (e.g. Cisco-IOS-XE-nve-oper:...)
!     The 17.18.02 XPath parser rejects the colon-prefix syntax.
!   - Use plain absolute XPaths only (e.g. /nve-oper-data/nve-oper)
!   - Do NOT use "receiver-type protocol" / named receiver mode — causes
!     "Transport requested" state with no data flow. Use "receiver ip address".
!
! SUBSCRIPTION ID RANGE — Catalyst Center coexistence:
!   When these IOS-XE devices are onboarded / managed by Cisco Catalyst Center,
!   Catalyst Center pushes its OWN "telemetry ietf subscription" entries for
!   wired Assurance. Those IDs are dynamically assigned by Catalyst Center and
!   are observed in the low ID range (commonly < 10000). To guarantee these
!   manually configured fabric subscriptions never collide with the ones
!   Catalyst Center manages, this fabric uses a dedicated HIGH band:
!       40101-40119  (= legacy 101-119 + 40000 offset)
!   The trailing digits are preserved for traceability (e.g. 40114 == old 114).
!   IOS-XE permits subscription IDs 1-2147483647, so this band is valid.
!   VERIFY before AND after Catalyst Center onboarding:
!       show telemetry ietf subscription all
!   If Catalyst Center ever assigns IDs inside the 40100 band on this platform,
!   shift the base offset (40000) to a higher unused block and re-apply.
! =============================================================================

! -----------------------------------------------------------------------------
! Sub 40101-40102 — NVE Global State
! YANG  : Cisco-IOS-XE-nve-oper
! XPath : /nve-oper-data/nve-oper
! Data  : NVE admin/oper state, BGP host-reachability, source interface,
!         L2/L3 VNI counts (l2cp_vni_num, l3cp_vni_num, vxlan_port, is_bgp_signal)
! Sub 40101: on-change  — immediate alerts on NVE state transitions
! Sub 40102: periodic 5 min (30000 cs) — baseline trend data for charts
! -----------------------------------------------------------------------------
telemetry ietf subscription 40101
 encoding encode-kvgpb
 filter xpath /nve-oper-data/nve-oper
 stream yang-push
 update-policy on-change
 source-vrf Mgmt-vrf
 receiver ip address 18.224.25.161 57444 protocol grpc-tcp
!
telemetry ietf subscription 40102
 encoding encode-kvgpb
 filter xpath /nve-oper-data/nve-oper
 stream yang-push
 update-policy periodic 30000
 source-vrf Mgmt-vrf
 receiver ip address 18.224.25.161 57444 protocol grpc-tcp
!

! -----------------------------------------------------------------------------
