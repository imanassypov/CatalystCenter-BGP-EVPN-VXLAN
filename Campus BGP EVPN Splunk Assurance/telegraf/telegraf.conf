[global_tags]

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "0s"
  omit_hostname = true

###############################################################################
#                            OUTPUTS                                          #
###############################################################################

[[outputs.http]]
  url = "https://10.0.10.104:8088/services/collector"
  data_format = "splunkmetric"
  splunkmetric_hec_routing = true
  insecure_skip_verify = true

  [outputs.http.headers]
    Content-Type = "application/json"
    Authorization = "Splunk 5dce60f7-e349-4a0b-bde2-374766ce4be4"
    X-Splunk-Request-Channel = "5dce60f7-e349-4a0b-bde2-374766ce4be4"

###############################################################################
#                            PROCESSORS                                       #
###############################################################################

## Append FQDN domain suffix to the source tag (IOS-XE MDT sends short hostname only)
[[processors.regex]]
  [[processors.regex.tags]]
    key         = "source"
    pattern     = "^(.+)$"
    replacement = "${1}.dcloud.cisco.com"

## NOTE: A Starlark processor was trialled here to promote cp_vnis (VNI ID) to
## a vni_id tag dimension on nve-peer-oper. It was removed because the YANG path
## /nve-oper-data/nve-oper/nve-peer-oper is keyed by peer-addr only — IOS-XE
## emits one entry per peer IP, not one per (peer, VNI). cp_vnis is a single
## scalar per peer; promoting it to a tag yields no additional VNI coverage.
## Full per-VNI peer topology is available via evpn-oper-data/evpn-inst/evpn-vlan/evpn-peer
## (subs 40111-40112) which is keyed by (evpn_inst_id, vlan_id, peer_ip_addr) and
## correctly exposes all VNIs. Dashboard Sankeys use that path instead.

## Convert BGP FSM session_state string → integer so it survives the metrics index.
## IOS-XE MDT sends session_state as a string enum leaf; Splunk's metrics index
## silently drops all string fields. The namepass below is intentionally omitted
## so this mapping applies to ALL measurements — session_state only appears in
## Cisco-IOS-XE-bgp-oper:bgp-state-data/neighbors/neighbor (Sub 40114 / Sub 40119).
[[processors.enum]]
  [[processors.enum.mapping]]
    fields = ["session_state"]
    [processors.enum.mapping.value_mappings]
      "IDLE"        = 0
      "ACTIVE"      = 1
      "CONNECT"     = 2
      "OPENSENT"    = 3
      "OPENCONFIRM" = 4
      "ESTABLISHED" = 5

###############################################################################
#                            INPUTS                                           #
###############################################################################

## IOS-XE MDT dial-out — EVPN fabric devices (Spine, Leaf, Border)
## Receives Cisco-IOS-XE-evpn-oper, Cisco-IOS-XE-nve-oper, Cisco-IOS-XE-bgp-oper,
## and Cisco-IOS-XE-bgp-oper address-family telemetry
## Active subscriptions on: Spine-01/02, Leaf-01/02, Border-01/02
##   40101-40102: NVE global state         (on-change + periodic 30s)
##   40103-40104: NVE VNI state            (on-change + periodic 60s)
##   40105-40106: NVE peer state           (on-change + periodic 30s)
##   40107-40108: EVPN instance            (on-change + periodic 60s)
##   40109-40110: EVPN VLAN binding        (on-change + periodic 60s)
##   40111-40112: EVPN EVI peer            (on-change + periodic 30s)
##   40114:     BGP neighbor state       (periodic 30s)
##   40116:     BGP AF prefix counts     (periodic 60s) — vrf_name + afi_safi tags
##             /bgp-state-data/address-families/address-family
##             Used for VRF→AF→Total Prefixes Sankey and time series dashboards
##
##   40119:     BGP neighbor FSM state — on-change (spines + borders only)
##             /bgp-state-data/neighbors/neighbor
##             IOS-XE emits session_state as a string enum; processors.enum
##             converts it to integer (IDLE=0 … ESTABLISHED=5) before indexing.
##             Deployed 2026-06-11 to Spine-01/02, Border-01/02 (Valid/on-change).
##             Leaves do not support on-change for this path — Sub 40114 (periodic
##             30s, same xpath) provides equivalent coverage for leaf devices.
##
## ACTIVE on 26.2.x (deployed + Valid on all 6 devices 2026-06-22):
##   40113: EVPN route stats per-VNI  (/evpn-oper-data/evpn-stats)  <-- parent container
##         periodic 60s — exposes explicit per-route-type counters under
##         evpn-stats/evpn-vni-rtcnt:
##         local-add/mac-cnt, local-add/mac-ip-cnt (Type 2 MAC/MAC-IP)
##         local-add/ip-prefix-cnt, remote-add/ip-prefix-cnt (Type 5 IP-Prefix)
##         local-add/imet-cnt (Type 3), local-add/ead-evi-cnt (Type 1), etc.
##         NOTE: subscribe to the PARENT container /evpn-oper-data/evpn-stats.
##         The child path .../evpn-vni-rtcnt is rejected as Invalid on 26.02 (V262);
##         the parent validates (Valid/Connected) and carries the same data.
##         (Was Invalid on 17.18.02 — entire evpn-stats subtree unavailable.)
##   40115: VRF oper state (/vrf-oper-data/vrf-entry) — Connected but all fields are
##         strings (vrf-name, RD); Splunk metrics index requires at least one numeric
##         field; telegraf splunkmetric output dropped every event silently
##   40117: Duplicate of 40116 (same YANG path, faster 30s interval) — removed to avoid
##         duplicate metrics in the index
[[inputs.cisco_telemetry_mdt]]
  transport       = "grpc"
  service_address = ":57345"
  max_msg_size    = 8000000
