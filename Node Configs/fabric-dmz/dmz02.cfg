!
!
!
!
!
!
device-tracking tracking
!
device-tracking policy IPDT_POLICY
 tracking enable
!
l2vpn evpn
 replication-type static
 router-id Loopback0
!
l2vpn evpn instance 902 vlan-based
 encapsulation vxlan
 replication-type static
!
l2vpn evpn instance 903 vlan-based
 encapsulation vxlan
 replication-type static
!
!
crypto pki trustpoint TP-self-signed
 enrollment selfsigned
 subject-name cn=IOS-Self-Signed-Certificate
 revocation-check none
 rsakeypair TP-self-signed
 hash sha512
!
crypto pki trustpoint SLA-TrustPoint
 enrollment pkcs12
 revocation-check crl
 hash sha512
!
! NOTE: self-signed certificate chains are device-generated on first boot and
!       are intentionally omitted from this reference config.
!
license boot level network-advantage addon dna-advantage
memory free low-watermark processor 74467
!
diagnostic bootup level minimal
!
spanning-tree mode rapid-pvst
spanning-tree extend system-id
!
!
!
!
username net-admin privilege 15 secret 9 $9$h9SGufMIAN1TnE$W57TpFfRHHZQg7ngxvULDc/gCUYNOwm14HIu2WoXFlo
username cisco privilege 15 secret 9 $9$iQXTSkor44bQJE$tIsWB8DmXSSoZcZnQjL8fiV.iKInRnAm59B.3o3ksQ6
!
redundancy
 mode sso
crypto engine compliance shield disable
!
!
!
!
!
vlan configuration 902
 member evpn-instance 902 vni 50902
vlan configuration 903
 member evpn-instance 903 vni 50903
