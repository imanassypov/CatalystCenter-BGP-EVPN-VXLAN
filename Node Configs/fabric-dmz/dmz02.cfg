version 17.15
service timestamps debug datetime msec
service timestamps log datetime msec
!
hostname dmz2
!
!
vrf definition Mgmt-vrf
 !
 address-family ipv4
 exit-address-family
 !
 address-family ipv6
 exit-address-family
!
vrf definition blue
 description VRF blue definition
 rd 172.18.200.2:902
 !
 address-family ipv4
  mdt auto-discovery vxlan
  mdt default vxlan 239.190.0.2
  mdt data vxlan 239.190.2.0 0.0.0.255
  mdt data threshold 1
  mdt overlay use-bgp
  route-target export 65004:902
  route-target import 65004:902
  route-target import 65004:1000
  route-target export 65004:902 stitching
  route-target import 65004:902 stitching
 exit-address-family
!
vrf definition green
 description VRF green definition
 rd 172.18.200.2:903
 !
 address-family ipv4
  mdt auto-discovery vxlan
  mdt default vxlan 239.190.0.3
  mdt data vxlan 239.190.3.0 0.0.0.255
  mdt data threshold 1
  mdt overlay use-bgp
  route-target export 65004:903
  route-target import 65004:903
  route-target import 65004:1000
  route-target export 65004:903 stitching
  route-target import 65004:903 stitching
 exit-address-family
!
vrf definition shared
 rd 172.18.200.2:1000
 !
 address-family ipv4
  route-replicate from vrf blue unicast all
  route-replicate from vrf green unicast all
  route-target export 65004:1000
  route-target import 65004:902
  route-target import 65004:903
 exit-address-family
!
no logging console
aaa new-model
!
!
aaa authentication login default local
aaa authorization exec default local
!
!
aaa session-id common
switch 1 provision c9kv-uadp-8p
