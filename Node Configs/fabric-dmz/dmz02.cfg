!
interface Loopback0
 description Routing Loopback
 ip address 198.19.2.200 255.255.255.255
 ip pim sparse-mode
!
interface Loopback1
 description GRE TUNNEL SOURCE
 ip address 10.100.4.1 255.255.255.255
!
interface GigabitEthernet0/0
 vrf forwarding Mgmt-vrf
 ip address 198.18.128.114 255.255.192.0
 negotiation auto
 ipv6 dhcp client request vendor
 ipv6 address dhcp
 ipv6 address autoconfig
 ipv6 enable
!
interface GigabitEthernet1/0/1
 description Core1
 no switchport
 ip address 198.19.2.86 255.255.255.252
 ip pim sparse-mode
 ip ospf network point-to-point
!
interface GigabitEthernet1/0/2
 description Core2
 no switchport
 ip address 198.19.2.90 255.255.255.252
 ip pim sparse-mode
 ip ospf network point-to-point
!
interface GigabitEthernet1/0/3
 description FW
 no switchport
 vrf forwarding shared
 ip address 198.19.2.93 255.255.255.252
 load-interval 30
!
interface GigabitEthernet1/0/4
 device-tracking attach-policy IPDT_POLICY
!
interface GigabitEthernet1/0/5
 description dhcp-server-multivrf
 switchport trunk allowed vlan 101,111
 switchport mode trunk
 device-tracking attach-policy IPDT_POLICY
!
interface GigabitEthernet1/0/6
 device-tracking attach-policy IPDT_POLICY
!
interface GigabitEthernet1/0/7
 device-tracking attach-policy IPDT_POLICY
!
interface GigabitEthernet1/0/8
 device-tracking attach-policy IPDT_POLICY
!
interface Vlan1
 no ip address
 shutdown
!
interface Vlan101
 vrf forwarding green
 ip address 198.18.145.1 255.255.255.0
 no autostate
!
interface Vlan111
 vrf forwarding blue
 ip address 198.18.146.1 255.255.255.0
 no autostate
!
interface Vlan902
 description ** SVI for blue L3VNI **
 vrf forwarding blue
 ip unnumbered Loopback0
 no ip redirects
 no ip unreachables
 ip pim sparse-mode
 no autostate
!
interface Vlan903
 description ** SVI for green L3VNI **
 vrf forwarding green
 ip unnumbered Loopback0
 no ip redirects
 no ip unreachables
 ip pim sparse-mode
 no autostate
!
interface nve1
 no ip address
 source-interface Loopback0
 host-reachability protocol bgp
 member vni 50902 vrf blue
 member vni 50903 vrf green
!
interface Tunnel10
 description GRE TO Border-01.dcloud.cisco.com
 ip address 10.100.102.1 255.255.255.252
 no ip redirects
 no ip unreachables
 no ip proxy-arp
 ip pim sparse-mode
 ip ospf network point-to-point
 ip ospf 100 area 0
 tunnel source Loopback1
 tunnel destination 10.100.2.5
 tunnel path-mtu-discovery
!
interface Tunnel11
 description GRE TO Border-02.dcloud.cisco.com
 ip address 10.100.103.1 255.255.255.252
 no ip redirects
 no ip unreachables
 no ip proxy-arp
 ip pim sparse-mode
 ip ospf network point-to-point
 ip ospf 100 area 0
 tunnel source Loopback1
 tunnel destination 10.100.2.6
 tunnel path-mtu-discovery
!
router ospf 100
 router-id 198.19.2.200
 redistribute connected route-map LOOPBACK0-INTO-OSPF100
!
router bgp 65004
 template peer-policy PEER-POLICY
  soft-reconfiguration inbound
 exit-peer-policy
 !
 template peer-policy OVERLAY-Border-EVPN-PEER-POLICY
  soft-reconfiguration inbound
  send-community both
 exit-peer-policy
 !
 template peer-session OVERLAY-Border-EVPN-PEER-SESSION-POLICY
  remote-as 65001
  description VXLAN-GW-2-LEAF-EVPN-PEER
  log-neighbor-changes
  ebgp-multihop 255
  update-source Loopback0
 exit-peer-session
 !
 bgp router-id interface Loopback0
 bgp log-neighbor-changes
 neighbor 10.101.1.2 inherit peer-session OVERLAY-Border-EVPN-PEER-SESSION-POLICY
 neighbor 10.101.2.2 inherit peer-session OVERLAY-Border-EVPN-PEER-SESSION-POLICY
 neighbor 198.19.2.85 remote-as 65002
 neighbor 198.19.2.89 remote-as 65002
 !
 address-family ipv4
  redistribute connected route-map TO-BGP
  no neighbor 10.101.1.2 activate
  no neighbor 10.101.2.2 activate
  neighbor 198.19.2.85 activate
  neighbor 198.19.2.85 soft-reconfiguration inbound
  neighbor 198.19.2.89 activate
  neighbor 198.19.2.89 soft-reconfiguration inbound
  maximum-paths 2
 exit-address-family
 !
 address-family l2vpn evpn
  bgp additional-paths select all
  bgp additional-paths send receive
  rewrite-evpn-rt-asn
  neighbor 10.101.1.2 activate
  neighbor 10.101.1.2 send-community both
  neighbor 10.101.1.2 inherit peer-policy OVERLAY-Border-EVPN-PEER-POLICY
  neighbor 10.101.1.2 route-map EVPN-TYPE5-ONLY in
  neighbor 10.101.1.2 route-map DMZ-policy-out out
  neighbor 10.101.2.2 activate
  neighbor 10.101.2.2 send-community both
  neighbor 10.101.2.2 inherit peer-policy OVERLAY-Border-EVPN-PEER-POLICY
  neighbor 10.101.2.2 route-map EVPN-TYPE5-ONLY in
  neighbor 10.101.2.2 route-map DMZ-policy-out out
 exit-address-family
 !
 address-family ipv4 vrf blue
  advertise l2vpn evpn
  import path selection all
  redistribute static
  redistribute connected
  maximum-paths 2
  default-information originate
 exit-address-family
 !
 address-family ipv4 vrf green
  advertise l2vpn evpn
  import path selection all
  redistribute static
  redistribute connected
  maximum-paths ibgp 2
  default-information originate
 exit-address-family
 !
 address-family ipv4 vrf shared
  advertise l2vpn evpn
  network 0.0.0.0
  redistribute connected
  default-information originate
 exit-address-family
!
ip forward-protocol nd
ip tcp mss 1280
ip tcp window-size 212000
ip http server
ip http authentication local
ip http secure-server
ip http client source-interface GigabitEthernet0/0
ip pim rp-address 198.19.1.254
ip pim spt-threshold 0
ip route vrf Mgmt-vrf 0.0.0.0 0.0.0.0 198.18.128.1
ip route vrf blue 0.0.0.0 0.0.0.0 198.19.2.94
ip route vrf green 0.0.0.0 0.0.0.0 198.19.2.94
ip route vrf shared 0.0.0.0 0.0.0.0 198.19.2.94
ip ssh bulk-mode 131072
ip ssh source-interface GigabitEthernet0/0
!
ip as-path access-list 1 permit _$
!
!
ip prefix-list evpn-to-shared seq 5 permit 0.0.0.0/0 le 32
!
ip prefix-list shared-to-evpn seq 5 permit 0.0.0.0/0
logging source-interface GigabitEthernet0/0 vrf Mgmt-vrf
logging host 10.0.10.104 vrf Mgmt-vrf
logging host 10.0.10.86 vrf Mgmt-vrf
route-map DMZ-policy-out permit 10
 match as-path 1
!
route-map EVPN-TYPE5-ONLY permit 10
 match evpn route-type 5
!
route-map LOOPBACK0-INTO-OSPF100 permit 10
 match interface Loopback0
!
route-map TO-BGP permit 10
 match interface Loopback0
!
route-map TO-BGP permit 30
 match interface Loopback1
