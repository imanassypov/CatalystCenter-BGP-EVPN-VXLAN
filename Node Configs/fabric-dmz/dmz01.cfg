 member evpn-instance 902 vni 50902
!
vlan configuration 903
 member evpn-instance 903 vni 50903
!
interface Vlan902
 description ** SVI for blue L3VNI **
 vrf forwarding blue
 ip unnumbered Loopback0
 ip pim sparse-mode
 ip nat inside
 no ip redirects
 no ip unreachables
 no autostate
!
interface Vlan903
 description ** SVI for green L3VNI **
 vrf forwarding green
 ip unnumbered Loopback0
 ip pim sparse-mode
 ip nat inside
 no ip redirects
 no ip unreachables
 no autostate
!
interface nve1
 no ip address
 source-interface Loopback0
 host-reachability protocol bgp
 member vni 50902 vrf blue
 member vni 50903 vrf green
 ip nat inside
!
router ospf 1
 router-id 172.18.200.1
!
router bgp 65003
 template peer-policy PEER-POLICY
  soft-reconfiguration inbound
 exit-peer-policy
 !
 template peer-policy OVERLAY-Border-EVPN-PEER-POLICY
  soft-reconfiguration inbound
  send-community both
 exit-peer-policy
 !
 template peer-session PEER-SESSION
  remote-as 65002
  ebgp-multihop 4
  update-source Loopback0
 exit-peer-session
 !
 template peer-session OVERLAY-Border-EVPN-PEER-SESSION-POLICY
  remote-as 65001
  description VXLAN-GW-2-LEAF-EVPN-PEER
  log-neighbor-changes
  ebgp-multihop 255
  update-source Loopback0
 exit-peer-session
 !        
 bgp router-id interface Loopback0
 bgp log-neighbor-changes
 neighbor 172.16.255.6 inherit peer-session OVERLAY-Border-EVPN-PEER-SESSION-POLICY
 neighbor 172.16.255.7 inherit peer-session OVERLAY-Border-EVPN-PEER-SESSION-POLICY
 neighbor 172.16.255.8 remote-as 65002
 neighbor 172.16.255.8 inherit peer-session PEER-SESSION
 neighbor 172.16.255.9 remote-as 65002
 neighbor 172.16.255.9 inherit peer-session PEER-SESSION
 !
 address-family ipv4
  redistribute connected route-map TO-BGP
  neighbor 172.16.255.8 activate
  neighbor 172.16.255.8 inherit peer-policy PEER-POLICY
  neighbor 172.16.255.9 activate
  neighbor 172.16.255.9 inherit peer-policy PEER-POLICY
  maximum-paths 2
 exit-address-family
 !
 address-family l2vpn evpn
  bgp additional-paths select all
  bgp additional-paths send receive
  rewrite-evpn-rt-asn
  neighbor 172.16.255.6 activate
  neighbor 172.16.255.6 send-community both
  neighbor 172.16.255.6 inherit peer-policy OVERLAY-Border-EVPN-PEER-POLICY
  neighbor 172.16.255.6 route-map EVPN-TYPE5-ONLY in
  neighbor 172.16.255.6 route-map DMZ-policy-out out
  neighbor 172.16.255.7 activate
  neighbor 172.16.255.7 send-community both
  neighbor 172.16.255.7 inherit peer-policy OVERLAY-Border-EVPN-PEER-POLICY
  neighbor 172.16.255.7 route-map EVPN-TYPE5-ONLY in
  neighbor 172.16.255.7 route-map DMZ-policy-out out
 exit-address-family
 !
 address-family ipv4 vrf blue
  advertise l2vpn evpn
  import path selection all
  redistribute static
  redistribute connected
  maximum-paths 2
  default-information originate
 exit-address-family
 !
 address-family ipv4 vrf green
  advertise l2vpn evpn
  import path selection all
  redistribute static
  redistribute connected
  maximum-paths ibgp 2
  default-information originate
 exit-address-family
 !
 address-family ipv4 vrf shared
  advertise l2vpn evpn
  network 0.0.0.0
  redistribute connected
  default-information originate
 exit-address-family
!
ip forward-protocol nd
ip tcp mss 1280
ip tcp window-size 212000
ip http server
ip http authentication local
ip http secure-server
ip http client source-interface GigabitEthernet0/0
ip route vrf Mgmt-vrf 0.0.0.0 0.0.0.0 10.0.1.1
ip route vrf blue 0.0.0.0 0.0.0.0 10.0.1.1
ip route vrf green 0.0.0.0 0.0.0.0 10.0.1.1
ip pim rp-address 172.16.255.254
ip pim spt-threshold 0
ip pim vrf blue rp-address 172.17.254.100
ip pim vrf green rp-address 172.17.254.100
ip route vrf shared 0.0.0.0 0.0.0.0 10.0.1.1
!
ip access-list extended FABRIC-TO-SHARED-NAT
 10 permit ip 10.1.0.0 0.0.255.255 any
!
ip nat inside source list FABRIC-TO-SHARED-NAT interface GigabitEthernet1/0/3 vrf blue overload
ip nat inside source list FABRIC-TO-SHARED-NAT interface GigabitEthernet1/0/3 vrf green overload
ip ssh bulk-mode 131072
ip ssh source-interface GigabitEthernet0/0
!
ip as-path access-list 1 permit _$
!
!
ip prefix-list evpn-to-shared seq 5 permit 0.0.0.0/0 le 32
!
ip prefix-list shared-to-evpn seq 5 permit 0.0.0.0/0
logging source-interface GigabitEthernet0/0 vrf Mgmt-vrf
logging host 10.0.10.104 vrf Mgmt-vrf
logging host 10.0.10.86 vrf Mgmt-vrf
route-map DMZ-policy-out permit 10 
 match as-path 1
!
route-map EVPN-TYPE5-ONLY permit 10
 match evpn route-type 5
!
route-map TO-BGP permit 10 
 match interface Loopback0
!
route-map TO-BGP permit 20 
 match interface Vlan120
