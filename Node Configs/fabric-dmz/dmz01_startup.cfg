! =============================================================
! Startup Configuration - dmz1
! Purpose : Minimal config for Catalyst Center discovery
! Mgmt IP : 10.0.1.107/24  GW: 10.0.1.1
! Loopback0: 172.16.255.7/32
! Generated: 2026-03-03
! =============================================================

hostname dmz1

! --- Management VRF ---
vrf definition Mgmt-vrf
 !
 address-family ipv4
 exit-address-family

! --- Domain (required for SSH key generation) ---
ip domain name dcloud.cisco.com

ip routing

! --- AAA ---
aaa new-model
aaa authentication login default local
aaa authorization exec default local

! --- Local credentials ---
username net-admin privilege 15 secret cisco
username cisco privilege 15 secret cisco

! --- Loopback0 (routing/OSPF router-id) ---
interface Loopback0
 description Routing Loopback
 ip address 172.16.255.7 255.255.255.255
 ip ospf 1 area 0

! --- Core-facing interfaces ---
interface GigabitEthernet1/0/1
 description Core1
 no switchport
 ip address 172.16.78.7 255.255.255.0
 ip pim sparse-mode
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown
!
interface GigabitEthernet1/0/2
 description Core2
 no switchport
 ip address 172.16.79.7 255.255.255.0
 ip pim sparse-mode
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown

! --- Management interface ---
interface GigabitEthernet0/0
 vrf forwarding Mgmt-vrf
 ip address 10.0.1.107 255.255.255.0
 negotiation auto
 no shutdown

! --- Default route in Mgmt-vrf ---
ip route vrf Mgmt-vrf 0.0.0.0 0.0.0.0 10.0.1.1

! --- BGP ---
router bgp 65002
 template peer-session PEER-SESSION
  remote-as 65002
  update-source Loopback0
 exit-peer-session
 !
 bgp router-id interface Loopback0
 bgp log-neighbor-changes
 neighbor 172.16.255.8 remote-as 65002
 neighbor 172.16.255.8 inherit peer-session PEER-SESSION
 neighbor 172.16.255.9 remote-as 65002
 neighbor 172.16.255.9 inherit peer-session PEER-SESSION
 !
 address-family ipv4
  redistribute connected route-map TO-BGP
  neighbor 172.16.255.8 activate
  neighbor 172.16.255.9 activate
 exit-address-family

! --- Route-map for BGP redistribution ---
route-map TO-BGP permit 10
 match interface Loopback0
!
route-map TO-BGP permit 20
 match interface Vlan120

! --- OSPF ---
router ospf 1
 router-id 172.16.255.7
!
! --- SSH version 2 ---
crypto key generate rsa modulus 2048
ip ssh version 2

! --- VTY lines - SSH only ---
line vty 0 15
 login authentication default
 transport input ssh
 exec-timeout 10 0

! --- SNMP ---
snmp-server community RO RO
snmp-server community RW RW
