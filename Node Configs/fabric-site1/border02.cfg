 description ** SVI for green L3VNI **
 vrf forwarding green
 ip unnumbered Loopback0
 no ip redirects
 no ip unreachables
 no ip proxy-arp
 ip pim sparse-mode
 load-interval 30
 carrier-delay msec 0
 no autostate
 hold-queue 4094 in
 hold-queue 4094 out
!
interface nve1
 description ** NVE Interface for VXLAN **
 no ip address
 source-interface Loopback0
 host-reachability protocol bgp
 member vni 50902 vrf blue
 member vni 50903 vrf green
!
router ospf 1
 router-id 172.16.255.7
!
router bgp 65001
 template peer-policy OVERLAY-SPINE-EVPN-PEER-POLICY
  soft-reconfiguration inbound
  send-community both
 exit-peer-policy
 !
 template peer-policy OVERLAY-MCLUSTER-EVPN-PEER-POLICY
  soft-reconfiguration inbound
  send-community both
 exit-peer-policy
 !
 template peer-session UNDERLAY-SPINE-EVPN-PEER-SESSION-POLICY
  remote-as 65001
  description SPINE-EVPN-PEER
  log-neighbor-changes
  update-source Loopback0
  fall-over route-map NODE-LOOPBACKS
 exit-peer-session
 !
 template peer-session OVERLAY-MCLUSTER-EVPN-PEER-SESSION-POLICY
  description VXLAN-MULTICLUSTER-REMOTE-SITE-EVPN-PEER
  log-neighbor-changes
  ebgp-multihop 4
  update-source Loopback0
  fall-over route-map NODE-LOOPBACKS
 exit-peer-session
 !
 bgp router-id interface Loopback0
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 172.16.255.1 inherit peer-session UNDERLAY-SPINE-EVPN-PEER-SESSION-POLICY
 neighbor 172.16.255.2 inherit peer-session UNDERLAY-SPINE-EVPN-PEER-SESSION-POLICY
 neighbor 172.18.200.1 remote-as 65003
 neighbor 172.18.200.1 inherit peer-session OVERLAY-MCLUSTER-EVPN-PEER-SESSION-POLICY
 !
 address-family ipv4
 exit-address-family
 !
 address-family ipv4 mvpn
  bgp nexthop trigger delay 0
  neighbor 172.16.255.1 activate
  neighbor 172.16.255.1 send-community extended
  neighbor 172.16.255.1 inherit peer-policy OVERLAY-SPINE-EVPN-PEER-POLICY
  neighbor 172.16.255.2 activate
  neighbor 172.16.255.2 send-community extended
  neighbor 172.16.255.2 inherit peer-policy OVERLAY-SPINE-EVPN-PEER-POLICY
 exit-address-family
 !
 address-family l2vpn evpn
  bgp nexthop trigger delay 0
  rewrite-evpn-rt-asn
  neighbor 172.16.255.1 activate
  neighbor 172.16.255.1 send-community extended
  neighbor 172.16.255.1 inherit peer-policy OVERLAY-SPINE-EVPN-PEER-POLICY
  neighbor 172.16.255.1 next-hop-self
  neighbor 172.16.255.2 activate
  neighbor 172.16.255.2 send-community extended
  neighbor 172.16.255.2 inherit peer-policy OVERLAY-SPINE-EVPN-PEER-POLICY
  neighbor 172.16.255.2 next-hop-self
  neighbor 172.18.200.1 activate
  neighbor 172.18.200.1 send-community extended
  neighbor 172.18.200.1 inherit peer-policy OVERLAY-MCLUSTER-EVPN-PEER-POLICY
 exit-address-family
 !
 address-family ipv4 vrf blue
  advertise l2vpn evpn
  import path selection all
  redistribute connected
  neighbor 172.18.200.1 remote-as 65003
  neighbor 172.18.200.1 activate
  neighbor 172.18.200.1 send-community both
  neighbor 172.18.200.1 next-hop-self
  maximum-paths ibgp 2
 exit-address-family
 !
 address-family ipv4 vrf green
  advertise l2vpn evpn
  import path selection all
  redistribute connected
  neighbor 172.18.200.1 remote-as 65003
  neighbor 172.18.200.1 activate
  neighbor 172.18.200.1 send-community both
  neighbor 172.18.200.1 next-hop-self
  maximum-paths ibgp 2
 exit-address-family
!
ip forward-protocol nd
ip tcp mss 1280
ip tcp window-size 212000
ip http server
ip http authentication local
ip http secure-server
ip http client source-interface GigabitEthernet0/0
ip pim rp-address 198.19.1.100
ip pim spt-threshold 0
ip pim vrf blue rp-address 172.17.254.100
ip pim vrf green rp-address 172.17.254.100
ip route vrf Mgmt-vrf 0.0.0.0 0.0.0.0 10.0.1.1
ip ssh bulk-mode 131072
ip ssh source-interface GigabitEthernet0/0
!
!
!
