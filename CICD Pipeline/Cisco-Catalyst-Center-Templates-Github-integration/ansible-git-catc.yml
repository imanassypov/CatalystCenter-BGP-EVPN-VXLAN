---
- name: Template Synchronization from Git using Template Workflow Manager
  hosts: catalyst_center
  gather_facts: yes
  vars_files:
    - vault.yml
  vars:
    DEBUG: "{{ lookup('env', 'DEBUG') | default(false) | bool }}"

  module_defaults:
    cisco.dnac.template_workflow_manager:
      dnac_host: "{{ dnac_host }}"
      dnac_username: "{{ dnac_username }}"
      dnac_password: "{{ dnac_password }}"
      dnac_verify: "{{ dnac_verify }}"
      dnac_port: "{{ dnac_port }}"
      dnac_version: "{{ dnac_version }}"
      dnac_debug: "{{ dnac_debug }}"
      dnac_log_level: "{{ dnac_log_level }}"
      dnac_log: "{{ dnac_log }}"

  tasks:
    - name: Set execution timestamp
      set_fact:
        start_timestamp: "{{ ansible_date_time }}"

    - name: --DEBUG-- Execution timestamp
      when: DEBUG
      debug:
        msg: "{{ start_timestamp.date + ' ' + start_timestamp.time }}"

    # starting with example repo url: "https://github.com/org/repo.git"
    # step 1: regex_replace('https://github\\.com/', '') - strips the https://github.com/ prefix. 
    # step 2: regex_replace('\\.git$', '') - strips the .git suffix.
    - name: Parse GitHub repository slug from git_repo URL
      set_fact:
        git_repo_slug: "{{ git_repo | regex_replace('https://github\\.com/', '') | regex_replace('\\.git$', '') }}"
        git_api_base: "{{ git_api_base_url | default('https://api.github.com') }}"

    # git_token is optional for public repositories.
    # When defined (private repos or to raise API rate limits), an Authorization header is included.
    # When absent, requests are made unauthenticated (GitHub allows ~60 requests/hour for public repos).
    - name: Build GitHub auth header
      set_fact:
        git_auth_header: "{{ {'Authorization': 'Bearer ' + git_token} if (git_token is defined and git_token | length > 0) else {} }}"

    - name: Verify GitHub repository is accessible
      uri:
        url: "{{ git_api_base }}/repos/{{ git_repo_slug }}"
        method: GET
        headers: "{{ git_auth_header | combine({'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28'}) }}"
        status_code: [200, 404]
      register: git_repo_check

    - name: Fail if GitHub repository not found
      fail:
        msg: "Repository not found: '{{ git_repo_slug }}'. Verify git_repo in inventory (HTTP {{ git_repo_check.status }})."
      when: git_repo_check.status != 200

    - name: Verify Git branch exists in repository
      uri:
        url: "{{ git_api_base }}/repos/{{ git_repo_slug }}/branches/{{ git_branch | default('HEAD') }}"
        method: GET
        headers: "{{ git_auth_header | combine({'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28'}) }}"
        status_code: [200, 404]
      register: git_branch_check

    - name: Fail if Git branch not found in repository
      fail:
        msg: "Branch '{{ git_branch | default('HEAD') }}' not found in '{{ git_repo_slug }}'. Verify git_branch in inventory (HTTP {{ git_branch_check.status }})."
      when: git_branch_check.status != 200

    - name: Fetch repository file tree from GitHub API
      uri:
        url: "{{ git_api_base }}/repos/{{ git_repo_slug }}/git/trees/{{ git_branch | default('HEAD') }}?recursive=1"
        method: GET
        headers: "{{ git_auth_header | combine({'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28'}) }}"
        status_code: 200
      register: repo_tree_response

    # MULTI-PROJECT SUBFOLDER SUPPORT
    # The playbook syncs one or more repository subfolders, each into its own
    # Catalyst Center Template-Programmer Project. `git_repo_subfolders` (a list
    # of { path, project_name } entries) defines what to sync.
    - name: Fail if git_repo_subfolders is not defined
      fail:
        msg: "git_repo_subfolders must be defined in inventory.yml as a non-empty list of { path, project_name } entries."
      when: git_repo_subfolders is not defined or git_repo_subfolders | length == 0

    - name: Build normalized subfolder list
      set_fact:
        normalized_subfolders: "{{ git_repo_subfolders }}"

    - name: --DEBUG-- Normalized subfolder list
      when: DEBUG
      debug:
        msg: "{{ normalized_subfolders }}"

    - name: Initialize aggregate sync summary
      set_fact:
        sync_summary: []

    - name: Sync each subfolder into its own Catalyst Center project
      include_tasks: tasks/process-subfolder.yml
      loop: "{{ normalized_subfolders }}"
      loop_control:
        loop_var: subfolder_item
        label: "{{ subfolder_item.path | default('(repo root)') }}"

    - name: Display synchronization summary
      debug:
        msg: "{{ ['Template synchronization completed successfully',
                  'Projects synced: ' ~ (sync_summary | length),
                  'Timestamp: ' ~ start_timestamp.date ~ ' ' ~ start_timestamp.time]
                 + (sync_summary | map('to_json') | list) }}"
