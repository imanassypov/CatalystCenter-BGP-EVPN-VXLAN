---
# process-subfolder.yml
# Syncs a single repository subfolder (`subfolder_item`) into its own Catalyst
# Center Template-Programmer Project. Included once per entry in
# `normalized_subfolders` by ansible-git-catc.yml. The repository file tree
# (`repo_tree_response`) is fetched once at the play level and re-filtered here
# per subfolder.

# Reset per-subfolder accumulators so facts never leak across iterations/projects.
- name: Reset per-subfolder accumulators
  set_fact:
    enriched_template_files: []
    enriched_composite_files: []
    composite_referenced_templates: []
    priority_template_list: []
    regular_template_list: []
    sorted_template_files: []
    template_workflow_configs: []
    composite_workflow_configs: []
    containing_templates_list: []
    template_sync_result: {}
    composite_sync_result: {}

- name: Build subfolder prefix filter
  set_fact:
    git_tree_prefix: "{{ (subfolder_item.path + '/') if (subfolder_item.path is defined and subfolder_item.path | length > 0) else '' }}"

- name: Build template and composite file lists from repository tree
  set_fact:
    api_template_files: "{{ repo_tree_response.json.tree | selectattr('type', 'eq', 'blob') | selectattr('path', 'search', '^' + git_tree_prefix) | selectattr('path', 'search', '\\.' + template_extension + '$') | list }}"
    api_composite_files: "{{ repo_tree_response.json.tree | selectattr('type', 'eq', 'blob') | selectattr('path', 'search', '^' + git_tree_prefix) | selectattr('path', 'search', '\\.yml$') | list }}"

- name: Warn and skip empty subfolder
  when: api_template_files | length == 0
  debug:
    msg: "No '{{ template_extension }}' templates found under '{{ subfolder_item.path | default('(repo root)') }}' - skipping this subfolder."

- name: Process subfolder (templates present)
  when: api_template_files | length > 0
  block:
    # Project name resolution order:
    #   1. Explicit subfolder_item.project_name
    #   2. Basename of the subfolder path
    #   3. Basename of the first template's parent folder (repo-root scans)
    - name: Resolve Catalyst Center project name for this subfolder
      set_fact:
        projectName: >-
          {{
            subfolder_item.project_name
            if (subfolder_item.project_name is defined and subfolder_item.project_name | length > 0)
            else (subfolder_item.path | basename
                  if (subfolder_item.path is defined and subfolder_item.path | length > 0)
                  else (api_template_files[0].path | dirname | basename))
          }}

    - name: --DEBUG-- Subfolder and project
      when: DEBUG
      debug:
        msg: "Subfolder '{{ subfolder_item.path | default('(repo root)') }}' -> project '{{ projectName }}'"

    - name: Fetch template file contents from GitHub
      uri:
        url: "https://raw.githubusercontent.com/{{ git_repo_slug }}/{{ git_branch | default('HEAD') }}/{{ item.path | replace(' ', '%20') }}"
        method: GET
        headers: "{{ git_auth_header }}"
        return_content: yes
        status_code: 200
      loop: "{{ api_template_files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      register: template_content_results

    - name: Fetch last commit info for each template file
      uri:
        url: "{{ git_api_base }}/repos/{{ git_repo_slug }}/commits?path={{ item.path | replace(' ', '%20') }}&per_page=1&sha={{ git_branch | default('HEAD') }}"
        method: GET
        headers: "{{ git_auth_header | combine({'Accept': 'application/vnd.github+json'}) }}"
        status_code: 200
      loop: "{{ api_template_files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      register: template_commit_results

    - name: Fetch commit diff for each template file
      when: include_diff_header and template_commit_results.results[diff_idx].json | length > 0
      uri:
        url: "{{ git_api_base }}/repos/{{ git_repo_slug }}/commits/{{ template_commit_results.results[diff_idx].json[0].sha }}"
        method: GET
        headers: "{{ git_auth_header | combine({'Accept': 'application/vnd.github+json'}) }}"
        status_code: 200
      loop: "{{ api_template_files }}"
      loop_control:
        index_var: diff_idx
        label: "{{ item.path | basename }}"
      register: template_diff_results

    - name: Build enriched template file objects
      set_fact:
        enriched_template_files: "{{ enriched_template_files | default([]) + [enriched] }}"
      vars:
        _commit_list: "{{ template_commit_results.results[tmpl_idx].json }}"
        _commit: "{{ _commit_list[0] if _commit_list | length > 0 else {} }}"
        _commit_message: "{{ (_commit.commit.author.date | default('') + ' | ' + _commit.commit.message | default('') + ' [' + _commit.commit.author.name | default('') + ']')[:catc_template_summary_maxchar] if _commit else 'Synced from Git' }}"
        _diff_files: "{{ template_diff_results.results[tmpl_idx].json.files | default([]) if (include_diff_header and template_diff_results is defined and not (template_diff_results.results[tmpl_idx].skipped | default(false))) else [] }}"
        _file_patch: "{{ (_diff_files | selectattr('filename', 'eq', item.path) | list | first).patch | default('') if _diff_files | length > 0 else '' }}"
        enriched:
          name: "{{ item.path | basename }}"
          path: "{{ item.path }}"
          content: "{{ template_content_results.results[tmpl_idx].content }}"
          commit_message: "{{ _commit_message }}"
          diff_content: "{{ _file_patch }}"
      loop: "{{ api_template_files }}"
      loop_control:
        index_var: tmpl_idx
        label: "{{ item.path | basename }}"

    - name: Fetch composite definition file contents from GitHub
      when: api_composite_files | length > 0
      uri:
        url: "https://raw.githubusercontent.com/{{ git_repo_slug }}/{{ git_branch | default('HEAD') }}/{{ item.path | replace(' ', '%20') }}"
        method: GET
        headers: "{{ git_auth_header }}"
        return_content: yes
        status_code: 200
      loop: "{{ api_composite_files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      register: composite_content_results

    - name: Build enriched composite file objects
      when: api_composite_files | length > 0
      set_fact:
        enriched_composite_files: "{{ enriched_composite_files | default([]) + [enriched] }}"
      vars:
        enriched:
          name: "{{ item.path | basename }}"
          path: "{{ item.path }}"
          content: "{{ composite_content_results.results[comp_idx].content }}"
      loop: "{{ api_composite_files }}"
      loop_control:
        index_var: comp_idx
        label: "{{ item.path | basename }}"

    # DYNAMIC TEMPLATE PROCESSING ORDER
    # Template processing order is derived from composite definitions:
    #   1. Find composite definition YAML files (.yml) in the subfolder
    #   2. Extract templates referenced by those composites (dependencies)
    #   3. Process regular templates first (so dependencies exist), then priority
    #      (referenced) templates, then the composites themselves.
    - name: Extract templates referenced in composite definitions
      set_fact:
        composite_referenced_templates: "{{ composite_referenced_templates | default([]) + (item.content | from_yaml).templates | map(attribute='name') | list }}"
      loop: "{{ enriched_composite_files | default([]) }}"
      when: enriched_composite_files is defined and enriched_composite_files | length > 0
      loop_control:
        label: "{{ item.name }}"

    - name: --DEBUG-- Templates referenced in composites
      when: DEBUG and composite_referenced_templates is defined
      debug:
        msg: "{{ composite_referenced_templates }}"

    - name: Build template lists based on composite references
      set_fact:
        priority_template_list: "{{ priority_template_list + [item] if (composite_referenced_templates is defined and item.name in composite_referenced_templates) else priority_template_list }}"
        regular_template_list: "{{ regular_template_list + [item] if (composite_referenced_templates is not defined or item.name not in composite_referenced_templates) else regular_template_list }}"
      loop: "{{ enriched_template_files }}"

    - name: Set template processing order (regular first for dependencies, then priority)
      set_fact:
        sorted_template_files: "{{ regular_template_list + priority_template_list }}"

    - name: --DEBUG-- show sorted template list
      when: DEBUG
      debug:
        msg: "{{ sorted_template_files | map(attribute='name') | list }}"

    - name: Process regular templates in correct order
      include_tasks: process-template.yml
      with_items: "{{ sorted_template_files }}"
      loop_control:
        loop_var: template_file
        index_var: template_idx

    - name: --DEBUG-- show template configurations
      when: DEBUG
      debug:
        msg: "{{ template_workflow_configs }}"

    - name: Process composite templates
      when: enriched_composite_files is defined and enriched_composite_files | length > 0
      include_tasks: process-composite.yml
      with_items: "{{ enriched_composite_files | default([]) }}"
      loop_control:
        loop_var: composite_file

    - name: --DEBUG-- show composite configurations
      when: DEBUG and composite_workflow_configs is defined
      debug:
        msg: "{{ composite_workflow_configs }}"

    - name: Synchronize all templates using template_workflow_manager
      when: template_workflow_configs is defined and template_workflow_configs | length > 0
      cisco.dnac.template_workflow_manager:
        state: merged
        config: "{{ template_workflow_configs }}"
      register: template_sync_result

    - name: --DEBUG-- show template sync results
      when: DEBUG
      debug:
        msg: "{{ template_sync_result }}"

    - name: Synchronize composite templates using template_workflow_manager
      when: composite_workflow_configs is defined and composite_workflow_configs | length > 0
      cisco.dnac.template_workflow_manager:
        state: merged
        config: "{{ composite_workflow_configs }}"
      register: composite_sync_result

    - name: --DEBUG-- show composite sync results
      when: DEBUG and composite_sync_result is defined
      debug:
        msg: "{{ composite_sync_result }}"

    - name: Record per-project sync summary
      set_fact:
        sync_summary: "{{ sync_summary | default([]) + [project_summary] }}"
      vars:
        project_summary:
          subfolder: "{{ subfolder_item.path | default('(repo root)') }}"
          project: "{{ projectName }}"
          templates_synced: "{{ template_workflow_configs | default([]) | length }}"
          composites_synced: "{{ composite_workflow_configs | default([]) | length }}"

    - name: Display per-project synchronization summary
      debug:
        msg:
          - "Subfolder synced: {{ subfolder_item.path | default('(repo root)') }}"
          - "Project: {{ projectName }}"
          - "Regular templates synced: {{ template_workflow_configs | default([]) | length }}"
          - "Composite templates synced: {{ composite_workflow_configs | default([]) | length }}"
