---
- name: Initialize shared backup timestamp
  hosts: localhost
  gather_facts: false
  tasks:
    - ansible.builtin.import_role:
        name: backup_configs
        tasks_from: set_timestamp

- name: Backup running-config from IOS-XE devices
  hosts: iosxe
  gather_facts: false
  # Device SSH creds: inventory/group_vars/iosxe/vault.yml (vault_device_*)
  vars:
    backup_output_dir: "{{ backup_root_dir }}/{{ hostvars['localhost']['backup_timestamp'] }}"
  tasks:
    - ansible.builtin.import_role:
        name: backup_configs
        tasks_from: backup_iosxe

- name: Backup running-config from NX-OS devices
  hosts: nxos
  gather_facts: false
  # Device SSH creds: inventory/group_vars/nxos/vault.yml (vault_device_*)
  vars:
    backup_output_dir: "{{ backup_root_dir }}/{{ hostvars['localhost']['backup_timestamp'] }}"
  tasks:
    - ansible.builtin.import_role:
        name: backup_configs
        tasks_from: backup_nxos
