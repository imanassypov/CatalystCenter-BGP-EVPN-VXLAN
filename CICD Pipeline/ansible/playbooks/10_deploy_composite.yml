---
- name: Deploy Composite Templates to Managed Devices from settings.json
  hosts: catalyst_center
  gather_facts: false
  vars_files:
    - ../inventory/group_vars/catalyst_center/vault.yml
  vars:
    catc_debug: "{{ lookup('env', 'DEBUG') | default(false) | bool }}"
  module_defaults:
    cisco.dnac.configuration_template_deploy_v2:
      dnac_host: "{{ dnac_host }}"
      dnac_username: "{{ catc_username }}"
      dnac_password: "{{ catc_password }}"
      dnac_verify: "{{ dnac_verify }}"
      dnac_port: "{{ dnac_port }}"
      dnac_version: "{{ dnac_version }}"
      dnac_debug: "{{ dnac_debug }}"
  pre_tasks:
    - ansible.builtin.import_role:
        name: catc_common
        tasks_from: auth_token

    - ansible.builtin.import_role:
        name: catc_common
        tasks_from: load_settings
  roles:
    - role: deploy_composite
