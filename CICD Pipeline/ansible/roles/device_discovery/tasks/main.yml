---
# =============================================================================
# device_discovery / main.yml  —  Pipeline stage 4.0
# =============================================================================
# Submits Catalyst Center discovery jobs for management IPs listed in
# settings_data.project[].device_list. Uses global credentials already stored
# in CatC (stage 3) via description references — not inline passwords.
#
# Prerequisites:
#   catc_common.load_settings → settings_data
#   Stage 3 credentials present (CLI-net-admin, RO, RW, NETCONF-netadmin)
#
# Module: cisco.dnac.discovery_workflow_manager (state: merged)
# =============================================================================

# Task: Build discovery config list
# Purpose: One discovery job per project row with a non-null device_list.
# Pre:  settings_data.project[0].device_list: "198.19.1.3,198.19.1.4"
# Post: discovery_list:
#         - discovery_name: "Global/PODS/POD 0/Building P0/Floor 1"
#           discovery_type: "MULTI RANGE"
#           ip_address_list: ["198.19.1.3", "198.19.1.4"]
#           protocol_order: "ssh"
#           global_credentials:
#             cli_credentials_list: [{description: CLI-net-admin, username: net-admin}]
#             snmp_v2_read_credential_list: [{description: RO}]
#             …
- name: Build discovery config list
  ansible.builtin.set_fact:
    discovery_list: >-
      {%- set ns = namespace(result=[]) -%}
      {%- for entry in settings_data.project -%}
        {%- if entry.device_list -%}
          {%- set ips = entry.device_list.split(',') | map('trim') | list -%}
          {%- set parent = entry.HierarchyParent | default('Global') -%}
          {%- set area   = entry.HierarchyArea   | default('') -%}
          {%- set bldg   = entry.HierarchyBldg   | default('') -%}
          {%- set floor  = entry.HierarchyFloor  | default('') -%}
          {%- if floor -%}
            {%- set disc_name = parent + '/' + area + '/' + bldg + '/' + floor -%}
          {%- elif bldg -%}
            {%- set disc_name = parent + '/' + area + '/' + bldg -%}
          {%- elif area -%}
            {%- set disc_name = parent + '/' + area -%}
          {%- else -%}
            {%- set disc_name = parent -%}
          {%- endif -%}
          {%- set disc = {
            'discovery_name': disc_name,
            'discovery_type': 'MULTI RANGE',
            'ip_address_list': ips,
            'protocol_order': 'ssh',
            'retry': 5,
            'timeout': 3,
            'preferred_mgmt_ip_method': 'UseLoopBack',
            'discovery_specific_credentials': {
              'net_conf_port': '830'
            },
            'global_credentials': {
              'cli_credentials_list': [{'description': 'CLI-net-admin', 'username': 'net-admin'}],
              'snmp_v2_read_credential_list': [{'description': 'RO'}],
              'snmp_v2_write_credential_list': [{'description': 'RW'}],
              'net_conf_port_list': [{'description': 'NETCONF-netadmin'}]
            }
          } -%}
          {%- set ns.result = ns.result + [disc] -%}
        {%- endif -%}
      {%- endfor -%}
      {{ ns.result }}

- name: --DEBUG-- Discovery config list
  when: catc_debug | default(false) | bool
  ansible.builtin.debug:
    msg: "{{ discovery_list }}"

# Task: Validate discovery list is non-empty
# Pre:  discovery_list may be []
# Post: unchanged on success; fails if no device_list entries in JSON
- name: Validate discovery list is non-empty
  ansible.builtin.assert:
    that: discovery_list | length > 0
    fail_msg: "No entries with device_list found in input JSON."
    success_msg: "{{ discovery_list | length }} discovery task(s) to run."

# Task: Discover devices
# Purpose: Submit each discovery config to CatC (async workflow inside module).
# Pre:  discovery_list as above
# Post: discovery_results (register) — per-loop dnac_response with task IDs
- name: "Discover devices"
  cisco.dnac.discovery_workflow_manager:
    state: merged
    config:
      - "{{ item }}"
  loop: "{{ discovery_list }}"
  register: discovery_results

- name: --DEBUG-- Discovery results
  when: catc_debug | default(false) | bool
  ansible.builtin.debug:
    msg: "{{ discovery_results }}"

# Task: Device discovery complete — summary
- name: Device discovery complete
  ansible.builtin.debug:
    msg:
      - "Device discovery submitted successfully"
      - "Discovery tasks run: {{ discovery_list | length }}"
