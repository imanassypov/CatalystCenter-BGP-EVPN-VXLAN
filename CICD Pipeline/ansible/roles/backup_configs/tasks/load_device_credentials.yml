---
# =============================================================================
# backup_configs / load_device_credentials.yml  —  Stage 11.0 (play 1)
# =============================================================================
# Pushes device SSH credentials from settings.json (SSOT) onto iosxe/nxos host
# facts so connection.yml can template ansible_user/password/become_password.
#
# Prerequisites: catc_common.load_settings → settings_data
# Source: settings_data.project[0].device_credentials.cli_credential
# =============================================================================

- name: Validate settings_data is loaded
  ansible.builtin.assert:
    that:
      - settings_data is defined
      - settings_data.project is defined
      - settings_data.project | length > 0
    fail_msg: >-
      settings_data must be loaded before device credentials
      (import catc_common load_settings first).

- name: Extract CLI credential from settings.json
  ansible.builtin.set_fact:
    _cli_cred: "{{ settings_data.project[0].device_credentials.cli_credential | default({}) }}"

- name: Validate cli_credential in settings.json
  ansible.builtin.assert:
    that:
      - _cli_cred.username is defined
      - _cli_cred.username | length > 0
      - _cli_cred.password is defined
      - _cli_cred.password | length > 0
    fail_msg: >-
      settings.json project[0].device_credentials.cli_credential must define
      username and password (same SSOT used by stage 03_credentials).

- name: Push device SSH credentials to iosxe/nxos hosts from settings.json
  ansible.builtin.set_fact:
    vault_device_username: "{{ _cli_cred.username }}"
    vault_device_password: "{{ _cli_cred.password }}"
    vault_device_enable_password: "{{ _cli_cred.enable_password | default(_cli_cred.password) }}"
  delegate_to: "{{ item }}"
  delegate_facts: true
  loop: "{{ (groups['iosxe'] | default([])) + (groups['nxos'] | default([])) }}"
  no_log: true
