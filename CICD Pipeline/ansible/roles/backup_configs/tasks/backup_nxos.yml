---
# =============================================================================
# backup_configs / backup_nxos.yml  —  Stage 11.0 (play 3 of 3)
# =============================================================================
# Same pattern as backup_iosxe.yml for nxos inventory group, plus retention
# pruning of old timestamp directories on the control node.
# =============================================================================

- name: Ensure timestamped backup directory exists on controller
  ansible.builtin.file:
    path: "{{ backup_output_dir }}"
    state: directory
    mode: "0750"
  delegate_to: localhost
  run_once: true

# Task: Collect running configuration from NX-OS
# Post: run_cfg.stdout[0] → full running-config
- name: Collect running configuration from NX-OS
  cisco.nxos.nxos_command:
    commands:
      - show running-config
  register: run_cfg
  changed_when: false

- name: Save NX-OS config to local backup file
  ansible.builtin.copy:
    content: |
      ! Host: {{ inventory_hostname }}
      ! Collected: {{ hostvars['localhost']['backup_timestamp'] }}
      {{ run_cfg.stdout[0] }}
    dest: "{{ backup_output_dir }}/{{ inventory_hostname }}.cfg"
    mode: "0600"
  delegate_to: localhost

