---
# =============================================================================
# http_image_server / main.yml  —  SWIM HTTP image server (utils)
# =============================================================================
# Orchestrates Appendix A from 6.0 SWIM README: nginx + image staging +
# verification for Catalyst Center remote SWIM import.
#
# Playbook: playbooks/deploy_http_image_server.yml
# Inventory: image_servers group (swim_image_server host)
#
# Required group_vars:
#   image_servers/vault.yml  — vault_image_server_* SSH credentials
#   image_servers/vars.yml   — image_server_ip, image_local_paths
# =============================================================================

- name: Pre-flight validation and local image discovery
  ansible.builtin.import_tasks: preflight.yml

- name: Install and enable nginx
  ansible.builtin.import_tasks: install_nginx.yml

- name: Stage IOS-XE images on the server (idempotent rsync)
  ansible.builtin.import_tasks: stage_images.yml

- name: Configure nginx site for SWIM images
  ansible.builtin.import_tasks: configure_nginx.yml

- name: Open firewall for HTTP when ufw is active
  ansible.builtin.import_tasks: configure_firewall.yml

- name: Verify HTTP serving and report published URLs
  ansible.builtin.import_tasks: verify.yml
