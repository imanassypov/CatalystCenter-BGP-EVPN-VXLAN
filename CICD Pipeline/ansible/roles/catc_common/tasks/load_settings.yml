---
# =============================================================================
# catc_common / load_settings.yml
# =============================================================================
# Shared prerequisite for stages 1–5 and 8–10. Loads the single source of truth
# (Settings/settings.json) into play scope so downstream roles can iterate
# settings_data.project without re-reading the file.
#
# Invoked from playbooks via:
#   import_role: { name: catc_common, tasks_from: load_settings }
#
# Play-level inputs (from inventory/group_vars):
#   settings_json_path  — relative to playbooks/ (default ../../Settings/settings.json)
#   catc_debug          — optional; dumps resolved path and raw JSON when true
# =============================================================================

# Task: Resolve settings_json_path to absolute
# Purpose: Ansible file lookup requires a resolvable path; relative paths are
#          anchored to playbook_dir (the playbooks/ directory).
# Pre:  settings_json_path: "../../Settings/settings.json"
#       playbook_dir:       "/…/CICD Pipeline/ansible/playbooks"
# Post: _resolved_json_path: "/…/CICD Pipeline/Settings/settings.json"
- name: Resolve settings_json_path to absolute
  ansible.builtin.set_fact:
    _resolved_json_path: >-
      {{ settings_json_path if settings_json_path.startswith('/')
         else (playbook_dir + '/' + settings_json_path) }}

# Task: DEBUG | Resolved settings JSON path
# Pre/Post: unchanged — diagnostic only when catc_debug=true
- name: "DEBUG | Resolved settings JSON path"
  ansible.builtin.debug:
    var: _resolved_json_path
  when: catc_debug | default(false) | bool

# Task: Load settings JSON
# Purpose: Parse settings.json into a Jinja2-accessible dict for all pipeline roles.
# Pre:  _resolved_json_path → absolute file path (file must exist on control node)
# Post: settings_data (dict) — top-level keys include at minimum:
#       settings_data:
#         project:
#           - HierarchyParent: "Global"
#             HierarchyArea:   "PODS"
#             HierarchyBldg:   "POD 0"
#             HierarchyFloor:  "Floor 1"
#             device_list:     "198.19.1.3,198.19.1.4"
#             network_settings: { … }
#             network_profile:  { … }
#             device_credentials: { … }
- name: Load settings JSON
  ansible.builtin.set_fact:
    settings_data: "{{ lookup('file', _resolved_json_path) | from_json }}"

# Task: DEBUG | settings_data (raw JSON)
# Pre/Post: unchanged — dumps full settings_data when catc_debug=true
- name: "DEBUG | settings_data (raw JSON)"
  ansible.builtin.debug:
    var: settings_data
  when: catc_debug | default(false) | bool

# Task: Validate that project key exists in settings data
# Purpose: Fail fast before any CatC API call if the SSOT schema is empty.
# Pre:  settings_data may be {} or missing .project
# Post: unchanged on success; play aborts if project is missing or empty
- name: Validate that project key exists in settings data
  ansible.builtin.assert:
    that: settings_data.project is defined and settings_data.project | length > 0
    fail_msg: "settings.json must contain a non-empty 'project' list."
    success_msg: "Settings data loaded — {{ settings_data.project | length }} entries found."
