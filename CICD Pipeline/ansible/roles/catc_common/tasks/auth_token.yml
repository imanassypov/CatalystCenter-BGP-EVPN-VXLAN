---
# =============================================================================
# catc_common / auth_token.yml
# =============================================================================
# Obtains a short-lived Catalyst Center JWT for raw REST calls (uri module).
# Used by stages 9–10 (provision, deploy composite) and anywhere the collection
# module cannot express the required API (async 202 bodies, composite payloads).
#
# Credentials: catc_username / catc_password from encrypted vault.yml.
# Connection:  catc_host, catc_port, catc_verify from group_vars.
#
# Play-level output:
#   _catc_token — bearer string for X-Auth-Token header (no_log on storage)
# =============================================================================

# Task: Authenticate with Catalyst Center
# Purpose: POST /dna/system/api/v1/auth/token with HTTP Basic auth.
# Pre:  catc_host: "198.18.129.100"
#       catc_username / catc_password from vault
# Post: _auth_response (register):
#         _auth_response.json.Token: "eyJhbGciOiJIUzI1NiIsInR5cCI6…"
- name: Authenticate with Catalyst Center
  ansible.builtin.uri:
    url: "https://{{ catc_host }}:{{ catc_port }}/dna/system/api/v1/auth/token"
    method: POST
    user: "{{ catc_username }}"
    password: "{{ catc_password }}"
    force_basic_auth: true
    validate_certs: "{{ catc_verify }}"
    status_code: 200
  register: _auth_response
  no_log: true

# Task: Store auth token
# Purpose: Promote token to play-scope fact for subsequent uri tasks in the role/play.
# Pre:  _auth_response.json.Token present
# Post: _catc_token: "<JWT string>"  (available to all hosts in the play)
- name: Store auth token
  ansible.builtin.set_fact:
    _catc_token: "{{ _auth_response.json.Token }}"
  no_log: true
