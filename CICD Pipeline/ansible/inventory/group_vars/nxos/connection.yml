---
# Device SSH credentials — loaded from group_vars/nxos/vault.yml (encrypted).
# Until merged into catalyst_center/vault.yml, symlink to 11.0-Backup-My-Configs/vault.yml.
ansible_connection: network_cli
ansible_user: "{{ vault_device_username }}"
ansible_password: "{{ vault_device_password }}"
ansible_become: true
ansible_become_method: enable
ansible_become_password: "{{ vault_device_enable_password }}"
backup_root_dir: "{{ playbook_dir }}/../config-backups"
backup_retention_count: 3
