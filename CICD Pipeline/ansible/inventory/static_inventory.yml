---
# Static Ansible inventory — hosts not sourced from CML (Catalyst Center API, infra utilities).
# MCP bastion/Splunk: utils/mcp-ssh-server/inventory/static_hosts.yml (not Ansible).
all:
  children:
    catalyst_center:
      hosts:
        catalyst_center:
          ansible_host: localhost
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"

    image_servers:
      hosts:
        swim_image_server:
          ansible_host: "{{ image_server_ip }}"

    yangsuite_servers:
      hosts:
        yangsuite_server:
          ansible_host: "{{ yangsuite_server_ip }}"
