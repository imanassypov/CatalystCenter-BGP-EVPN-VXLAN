---
catc_namespace: cisco.catalystcenter

catalystcenter_host: 198.18.129.100

catalystcenter_port: "443"
# Supported versions (cisco.catalystcenter collection): 2.3.7.6, 2.3.7.9, 3.1.3.0, 3.1.6.0
#catalystcenter_version: "2.3.7.6"
catalystcenter_version: "2.3.7.9"
catalystcenter_verify: false

catalystcenter_debug: false
catalystcenter_log: true
catalystcenter_log_level: INFO
catalystcenter_log_append: true
catalystcenter_log_file_path: "{{ playbook_dir }}/../logs/catc-swim.log"

validate_response_schema: true
catalystcenter_api_task_timeout: 3600
catalystcenter_task_poll_interval: 30

# ── Central data model ───────────────────────────────────────────────────────
# Path to the settings.json-formatted input file — the single source of truth
# shared with stages 1.0 (site hierarchy), 4.0 (discovery) and 9.0 (provision).
# Each project entry's `swim` block supplies the image details; the site_name is
# derived from its HierarchyParent/Area/Bldg/Floor fields. Relative paths are
# resolved from the playbook directory (6.0-.../playbooks).
# Can be overridden at runtime: -e settings_json_path=/path/to/settings.json
settings_json_path: "../../Settings/settings.json"
