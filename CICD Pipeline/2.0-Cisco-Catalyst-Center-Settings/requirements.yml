# Ansible Galaxy collection requirements for Cisco-Catalyst-Center-Settings
# Compatible with Cisco Catalyst Center version 2.3.7.10
# Install with: ansible-galaxy collection install -r requirements.yml
#
# Modules used:
#   cisco.catalystcenter.sites_info                      — query all sites → _site_id_map
#   cisco.catalystcenter.device_credential_workflow_manager — global CLI/SNMP/NETCONF
#     credential create and site assignment
#
# Note: network settings are applied via raw ansible.builtin.uri
#   PUT /dna/intent/api/v1/network/{siteId} to bypass NCND01243 (see README).

collections:
  - name: cisco.catalystcenter
    version: "2.1.3"

  # ansible.utils is required by the cisco.catalystcenter action plugins
  # for argument-spec validation (AnsibleArgSpecValidator).
  - name: ansible.utils
    version: ">=2.11.0"
