[defaults]
inventory = ./inventory/hosts.yml
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
result_format = yaml
interpreter_python = auto_silent
# Plaintext file holding the vault password. Gitignored — never commit it.
# Run explicitly with:  ansible-playbook ... --vault-password-file .vault
vault_password_file = .vault

[privilege_escalation]
become = True
become_method = sudo
