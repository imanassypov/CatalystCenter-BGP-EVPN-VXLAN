---
- name: Discover Devices in Catalyst Center from settings.json
  hosts: catalyst_center
  gather_facts: no
  vars_files:
    - vault.yml
  vars:
    DEBUG: "{{ lookup('env', 'DEBUG') | default(false) | bool }}"

  module_defaults:
    cisco.dnac.discovery_workflow_manager:
      dnac_host: "{{ dnac_host }}"
      dnac_username: "{{ dnac_username }}"
      dnac_password: "{{ dnac_password }}"
      dnac_verify: "{{ dnac_verify }}"
      dnac_port: "{{ dnac_port }}"
      dnac_version: "{{ dnac_version }}"
      dnac_debug: "{{ dnac_debug }}"
      dnac_log_level: "{{ dnac_log_level }}"
      dnac_log: "{{ dnac_log }}"

  tasks:

    # ── Step 1: Load input data ───────────────────────────────────────────────
    - name: Resolve settings_json_path to absolute
      set_fact:
        _resolved_json_path: >-
          {{ settings_json_path if settings_json_path.startswith('/')
             else (playbook_dir + '/' + settings_json_path) }}

    - name: Load settings input JSON
      set_fact:
        settings_data: "{{ lookup('file', _resolved_json_path) | from_json }}"

    - name: Validate that project key exists in input data
      assert:
        that: settings_data.project is defined and settings_data.project | length > 0
        fail_msg: "Input JSON must contain a non-empty 'project' list."
        success_msg: "Input data loaded — {{ settings_data.project | length }} entries found."

    # ── Step 2: Build discovery config list ──────────────────────────────────
    #
    # Each entry in settings.json that has a non-null device_list produces one
    # discovery task.  The device_list is a comma-separated string of IPs that
    # is split into the module's ip_address_list.
    #
    # The discovery name is derived from the deepest non-null hierarchy field
    # (Floor > Bldg > Area > Parent) to give each discovery a meaningful label.
    #
    # Discovery uses the global credentials already configured in Catalyst
    # Center (cli_credentials_list references description + username only).
    # discovery_type MULTI RANGE is used so that non-contiguous individual
    # IPs are each treated as a separate target.
    #
    - name: Build discovery config list
      set_fact:
        discovery_list: >-
          {%- set ns = namespace(result=[]) -%}
          {%- for entry in settings_data.project -%}
            {%- if entry.device_list -%}
              {%- set ips = entry.device_list.split(',') | map('trim') | list -%}
              {%- set parent = entry.HierarchyParent | default('Global') -%}
              {%- set area   = entry.HierarchyArea   | default('') -%}
              {%- set bldg   = entry.HierarchyBldg   | default('') -%}
              {%- set floor  = entry.HierarchyFloor  | default('') -%}
              {%- if floor -%}
                {%- set disc_name = parent + '/' + area + '/' + bldg + '/' + floor -%}
              {%- elif bldg -%}
                {%- set disc_name = parent + '/' + area + '/' + bldg -%}
              {%- elif area -%}
                {%- set disc_name = parent + '/' + area -%}
              {%- else -%}
                {%- set disc_name = parent -%}
              {%- endif -%}
              {%- set disc = {
                'discovery_name': disc_name,
                'discovery_type': 'MULTI RANGE',
                'ip_address_list': ips,
                'protocol_order': 'ssh',
                'retry': 5,
                'timeout': 3,
                'preferred_mgmt_ip_method': 'UseLoopBack',
                'discovery_specific_credentials': {
                  'net_conf_port': '830'
                },
                'global_credentials': {
                  'cli_credentials_list': [{'description': 'CLI-net-admin', 'username': 'net-admin'}],
                  'snmp_v2_read_credential_list': [{'description': 'RO'}],
                  'snmp_v2_write_credential_list': [{'description': 'RW'}],
                  'net_conf_port_list': [{'description': 'NETCONF-netadmin'}]
                }
              } -%}
              {%- set ns.result = ns.result + [disc] -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ns.result }}

    - name: --DEBUG-- Discovery config list
      when: DEBUG
      debug:
        msg: "{{ discovery_list }}"

    - name: Validate discovery list is non-empty
      assert:
        that: discovery_list | length > 0
        fail_msg: "No entries with device_list found in input JSON."
        success_msg: "{{ discovery_list | length }} discovery task(s) to run."

    # ── Step 3: Run device discovery ─────────────────────────────────────────
    - name: "Discover devices"
      cisco.dnac.discovery_workflow_manager:
        state: merged
        config:
          - "{{ item }}"
      loop: "{{ discovery_list }}"
      register: discovery_results

    - name: --DEBUG-- Discovery results
      when: DEBUG
      debug:
        msg: "{{ discovery_results }}"

    # ── Step 4: Summary ────────────────────────────────────────────────────────
    - name: Device discovery complete
      debug:
        msg:
          - "Device discovery submitted successfully"
          - "Discovery tasks run: {{ discovery_list | length }}"
          - "Devices targeted: {{ discovery_list | map(attribute='ip_address_list') | flatten | join(', ') }}"
