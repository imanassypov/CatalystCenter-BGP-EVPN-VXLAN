---
- name: Apply Device Credentials from settings.json
  hosts: catalyst_center
  gather_facts: no
  vars_files:
    - vault.yml

  module_defaults:
    # cisco.dnac 6.7.0+ — device_credential_workflow_manager handles the full
    # CLI + SNMP v2c credential lifecycle (create, update, delete) and site
    # assignment in a single idempotent call.  NETCONF credentials still require
    # the v1 API modules (not supported by device_credential_workflow_manager).
    #
    # YAML anchor (&catc_auth) declared on device_credential_workflow_manager;
    # NETCONF modules alias (*catc_auth) — same pattern as playbooks 1.0 and 2.0.
    #
    # Modules used:
    #   device_credential_workflow_manager
    #     — create/update/delete CLI + SNMP v2c r/w credentials and assign to
    #       sites.  Handles idempotency internally — no external UUID map needed.
    #       APIs: POST/PUT/DELETE /dna/intent/api/v2/global-credential
    #             GET  /dna/intent/api/v1/site
    #             PUT  /dna/intent/api/v1/sites/{id}/deviceCredentials
    #
    #   global_credential_info   — query existing NETCONF credentials (v1)
    #                              API: GET /dna/intent/api/v1/global-credential
    #
    #   netconf_credential       — create / update NETCONF global credentials
    #                              API: POST/PUT /dna/intent/api/v1/global-credential/netconf
    #
    #   global_credential_delete — delete any credential by UUID (NETCONF)
    #                              API: DELETE /dna/intent/api/v1/global-credential/{id}
    cisco.dnac.device_credential_workflow_manager: &catc_auth
      dnac_host:     "{{ catc_host }}"
      dnac_username: "{{ catc_username }}"
      dnac_password: "{{ catc_password }}"
      dnac_verify:   "{{ catc_verify }}"
      dnac_port:     "{{ catc_port }}"
      dnac_version:  "{{ catc_version }}"
      dnac_debug:    "{{ catc_debug }}"
    cisco.dnac.global_credential_info:    *catc_auth
    cisco.dnac.netconf_credential:        *catc_auth
    cisco.dnac.global_credential_delete:  *catc_auth

  tasks:

    # ── Step 1: Load and validate settings.json ───────────────────────────────
    # settings.json is the single source of truth for every credential and
    # site-assignment entry.  Paths are resolved relative to the playbook
    # directory so the inventory var can be either absolute or relative.
    #
    - name: Resolve settings_json_path to absolute
      set_fact:
        _resolved_json_path: >-
          {{ settings_json_path if settings_json_path.startswith('/')
             else (playbook_dir + '/' + settings_json_path) }}

    - name: "DEBUG | Resolved settings JSON path"
      debug:
        var: _resolved_json_path
      when: catc_debug | default(false) | bool

    - name: Load settings input JSON
      set_fact:
        settings_data: "{{ lookup('file', _resolved_json_path) | from_json }}"

    - name: "DEBUG | settings_data (raw JSON)"
      debug:
        var: settings_data
      when: catc_debug | default(false) | bool

    - name: Validate that project key exists in input data
      assert:
        that: settings_data.project is defined and settings_data.project | length > 0
        fail_msg: "Input JSON must contain a non-empty 'project' list."
        success_msg: "Input data loaded — {{ settings_data.project | length }} entries found."

    # ── Step 2: Build workflow manager config ─────────────────────────────────
    #
    # Translates settings_data.project into the config list consumed by
    # device_credential_workflow_manager.  One config entry per project item.
    #
    # Each config entry may contain:
    #   global_credential_details    — credential definitions (CLI, SNMP v2c r/w)
    #   assign_credentials_to_site   — site assignment spec (state=merged only)
    #
    # Field names in settings.json are already snake_case and match the module
    # parameter names directly — no translation required.
    #
    # For state=deleted, assign_credentials_to_site is omitted so the module
    # only receives credential identifiers (description) for deletion.
    #
    # NETCONF credentials are extracted separately in Step 3 because
    # device_credential_workflow_manager does not support the NETCONF type.
    #
    - name: Build wfm_config from settings.json
      set_fact:
        wfm_config: >-
          {%- set ns = namespace(result=[]) -%}
          {%- for entry in settings_data.project -%}
            {%- set dc = entry.device_credentials | default({}) -%}
            {%- set ac = entry.assign_credentials | default(none) -%}
            {%- set item = {} -%}
            {%- set gcd = {} -%}
            {%- if dc.cli_credential | default({}) -%}
              {%- set gcd = gcd | combine({'cli_credential': [dc.cli_credential]}) -%}
            {%- endif -%}
            {%- if dc.snmp_v2c_read | default({}) -%}
              {%- set gcd = gcd | combine({'snmp_v2c_read': [dc.snmp_v2c_read]}) -%}
            {%- endif -%}
            {%- if dc.snmp_v2c_write | default({}) -%}
              {%- set gcd = gcd | combine({'snmp_v2c_write': [dc.snmp_v2c_write]}) -%}
            {%- endif -%}
            {%- if gcd | length > 0 -%}
              {%- set item = item | combine({'global_credential_details': gcd}) -%}
            {%- endif -%}
            {%- if (state | default('merged')) == 'merged'
                and ac and ac.site_name | default([]) | length > 0 -%}
              {%- set acsite = {'site_name': ac.site_name} -%}
              {%- if ac.cli_credential is defined and ac.cli_credential -%}
                {%- set acsite = acsite | combine({'cli_credential': ac.cli_credential}) -%}
              {%- endif -%}
              {%- if ac.snmp_v2c_read is defined and ac.snmp_v2c_read -%}
                {%- set acsite = acsite | combine({'snmp_v2c_read': ac.snmp_v2c_read}) -%}
              {%- endif -%}
              {%- if ac.snmp_v2c_write is defined and ac.snmp_v2c_write -%}
                {%- set acsite = acsite | combine({'snmp_v2c_write': ac.snmp_v2c_write}) -%}
              {%- endif -%}
              {%- set item = item | combine({'assign_credentials_to_site': acsite}) -%}
            {%- endif -%}
            {%- if item | length > 0 -%}
              {%- set ns.result = ns.result + [item] -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ns.result }}

    - name: "DEBUG | wfm_config"
      debug:
        var: wfm_config
      when: catc_debug | default(false) | bool

    - name: Display CLI/SNMP credentials to be processed
      debug:
        msg: >-
          {{ wfm_config | length }} credential group(s) queued,
          state={{ state | default('merged') }}

    # ── Step 3: Build NETCONF credential list ─────────────────────────────────
    #
    # NETCONF credentials are extracted separately because
    # device_credential_workflow_manager does not support the NETCONF type.
    # Handled by Phase C (create/update) and Phase D (delete) below.
    #
    # Sample (BGP_EVPN/Settings/settings.json):
    #
    #   netconf_list:
    #     [{ "description": "NETCONF-netadmin", "netconf_port": "830" }]
    #
    - name: Build netconf_list from device_credentials
      set_fact:
        netconf_list: >-
          {%- set ns = namespace(result=[], seen=[]) -%}
          {%- for entry in settings_data.project -%}
            {%- set dc = entry.device_credentials | default(none) -%}
            {%- if dc and dc.netconf_credential is defined and dc.netconf_credential -%}
              {%- set nc = dc.netconf_credential -%}
              {%- if nc.description is defined and nc.description not in ns.seen -%}
                {%- set ns.seen = ns.seen + [nc.description] -%}
                {%- set ns.result = ns.result + [{
                  'description':  nc.description,
                  'netconf_port': nc.netconf_port | string
                }] -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ns.result }}

    - name: "DEBUG | netconf_list"
      debug:
        var: netconf_list
      when: catc_debug | default(false) | bool

    - name: Display NETCONF credentials to be processed ({{ netconf_list | length }} total)
      debug:
        msg: "{{ netconf_list | map(attribute='description') | list }}"

    # ── Phase A: Create / Update / Delete CLI + SNMP v2c credentials ──────────
    #
    # device_credential_workflow_manager is idempotent: it internally queries
    # existing credentials, creates missing ones, and updates changed ones
    # (state=merged) or deletes them by description (state=deleted).  No manual
    # UUID mapping or create-vs-update splitting is required.
    #
    # config_verify: true triggers a post-apply re-query and diff check —
    # enabled automatically when catc_debug is true.
    #
    # assign_credentials_to_site is only present in wfm_config when
    # state=merged (built by Step 2); delete runs carry only
    # global_credential_details so the module targets the right credentials.
    #
    - name: "Phase A — Manage CLI+SNMP credentials (state={{ state | default('merged') }})"
      cisco.dnac.device_credential_workflow_manager:
        state:         "{{ state | default('merged') }}"
        config_verify: "{{ catc_debug | default(false) | bool }}"
        config:        "{{ wfm_config }}"
      register: _wfm_result
      when: wfm_config | length > 0

    - name: "DEBUG | Phase A — workflow manager result"
      debug:
        var: _wfm_result
      when:
        - catc_debug | default(false) | bool
        - wfm_config | length > 0

    # ── Phase B: Create / update NETCONF credentials (state=merged) ───────────
    #
    # CatC enforces one credential per NETCONF port (not per description).
    # Existence is therefore keyed by port — not description — to avoid
    # false-negative duplicate failures when the port already exists under a
    # different name (e.g. the factory 'defaultNetConfPort').
    #
    # Behaviour:
    #   port absent         → POST (create)
    #   port present, same description  → skip (idempotent)
    #   port present, diff description  → PUT (rename)
    #
    # POST and PUT both return HTTP 202 + async task ID; the cisco.dnac
    # netconf_credential module mishandles the 202 response body, so
    # ansible.builtin.uri + task polling is used instead.
    # A raw bearer token is acquired here for those URI calls.
    #
    # include_tasks (not a plain loop) ensures set_fact inside the task file
    # updates netconf_port_map before the next iteration starts.
    #
    # API paths:
    #   GET  /dna/intent/api/v1/global-credential?credentialSubType=NETCONF
    #   POST /dna/intent/api/v1/global-credential/netconf   ← create (202)
    #   PUT  /dna/intent/api/v1/global-credential/netconf   ← update (202)
    #   GET  /api/v1/task/{taskId}                          ← poll
    #
    - name: Phase B — Query existing NETCONF credentials
      cisco.dnac.global_credential_info:
        credentialSubType: NETCONF
      register: _netconf_info
      when:
        - (state | default('merged')) == 'merged'
        - netconf_list | length > 0

    - name: "DEBUG | Phase B — raw NETCONF credential info"
      debug:
        var: _netconf_info
      when:
        - catc_debug | default(false) | bool
        - (state | default('merged')) == 'merged'
        - netconf_list | length > 0

    - name: Phase B — Build netconf_port_map (port → {id, description})
      # Keyed by port string so the task file detects existing credentials
      # even when the stored description differs from the desired one.
      set_fact:
        netconf_port_map: >-
          {%- set m = {} -%}
          {%- for cred in _netconf_info.dnac_response.response | default([]) -%}
            {%- set _ = m.update({cred.netconfPort | string: {'id': cred.id, 'description': cred.description}}) -%}
          {%- endfor -%}
          {{ m }}
      when:
        - (state | default('merged')) == 'merged'
        - netconf_list | length > 0

    - name: "Phase B — netconf_port_map ({{ netconf_port_map | default({}) | length }} existing)"
      debug:
        msg: "{{ netconf_port_map | default({}) }}"
      when:
        - (state | default('merged')) == 'merged'
        - netconf_list | length > 0

    - name: Phase B — Authenticate for NETCONF raw API calls
      # ansible.builtin.uri is used for CREATE/UPDATE because the
      # cisco.dnac.netconf_credential module mishandles the 202 async
      # task response.  A raw bearer token is required for those calls.
      ansible.builtin.uri:
        url: "https://{{ catc_host }}:{{ catc_port }}/dna/system/api/v1/auth/token"
        method: POST
        user: "{{ catc_username }}"
        password: "{{ catc_password }}"
        force_basic_auth: true
        validate_certs: "{{ catc_verify }}"
        status_code: 200
      register: _netconf_auth
      no_log: true
      when:
        - (state | default('merged')) == 'merged'
        - netconf_list | length > 0

    - name: Phase B — Store auth token for NETCONF raw calls
      set_fact:
        _catc_token: "{{ _netconf_auth.json.Token }}"
      no_log: true
      when:
        - (state | default('merged')) == 'merged'
        - netconf_list | length > 0

    - name: "Phase B — Create/update NETCONF credentials ({{ netconf_list | length }} total)"
      include_tasks: tasks/netconf_create_or_update.yml
      loop: "{{ netconf_list }}"
      loop_control:
        loop_var: netconf_config
        label: "{{ netconf_config.description }}"
      when:
        - (state | default('merged')) == 'merged'
        - netconf_list | length > 0

    # ── Phase C: Delete NETCONF credentials (state=deleted) ───────────────────
    #
    # Phase A (device_credential_workflow_manager) handles CLI and
    # SNMP v2c deletion.  This phase deletes NETCONF credentials by UUID via
    # global_credential_delete.  Credentials absent from netconf_id_map (not
    # found in CatC) are silently skipped inside tasks/netconf_delete.yml.
    #
    # WARNING: Deleting credentials still assigned to sites or used by
    # discovered devices will interrupt device management in Catalyst Center.
    # Confirm all devices are decommissioned before running with state=deleted.
    #
    # API path:
    #   DELETE /dna/intent/api/v1/global-credential/{globalCredentialId}
    #
    - name: Phase C — Query existing NETCONF credentials (for deletion)
      cisco.dnac.global_credential_info:
        credentialSubType: NETCONF
      register: _netconf_info
      when:
        - (state | default('merged')) == 'deleted'
        - netconf_list | length > 0

    - name: Phase C — Build netconf_id_map (description → UUID)
      set_fact:
        netconf_id_map: >-
          {%- set m = {} -%}
          {%- for cred in _netconf_info.dnac_response.response | default([]) -%}
            {%- set _ = m.update({cred.description: cred.id}) -%}
          {%- endfor -%}
          {{ m }}
      when:
        - (state | default('merged')) == 'deleted'
        - netconf_list | length > 0

    - name: "Phase C — Delete NETCONF credentials ({{ netconf_list | length }} total)"
      include_tasks: tasks/netconf_delete.yml
      loop: "{{ netconf_list }}"
      loop_control:
        loop_var: netconf_config
        label: "{{ netconf_config.description }}"
      when:
        - (state | default('merged')) == 'deleted'
        - netconf_list | length > 0

    # ── Summary ───────────────────────────────────────────────────────────────
    - name: Device credentials provisioning complete
      debug:
        msg: >-
          {{ 'Deleted' if (state | default('merged')) == 'deleted' else 'Successfully provisioned' }}
          {{ wfm_config | length }} CLI/SNMP credential group(s)
          and {{ netconf_list | length }} NETCONF credential(s).
