---
# =============================================================================
# tasks/netconf_create_or_update.yml
#
# Creates or updates ONE NETCONF global credential.
# Loop variable: netconf_config  (set by the include_tasks loop in
#                                 credentials.yml Phase B)
#
# Existence is determined by NETCONF PORT, not description, because CatC
# enforces one credential per port (duplicate port → task fails with
# "Duplicate credential").  Checking by description would miss matches when
# the desired description differs from the one stored in CatC.
#
# Decision matrix:
#   port absent in CatC              → CREATE (POST)
#   port present, description same   → skip (idempotent)
#   port present, description differs→ UPDATE (PUT) to rename
#
# POST and PUT both return HTTP 202 + async task ID body.  The
# cisco.dnac.netconf_credential module mishandles this response; raw
# ansible.builtin.uri + task polling is used instead.
#
# Play-scope vars required (set by credentials.yml Phase B):
#   netconf_port_map — {port_str: {id, description}}
#   _catc_token      — bearer token for Authorization header
#   catc_host / catc_port / catc_verify / catc_debug
#
# API paths:
#   CREATE → POST /dna/intent/api/v1/global-credential/netconf
#             body: list [{description, netconfPort}]  → 202 + task ID
#   UPDATE → PUT  /dna/intent/api/v1/global-credential/netconf
#             body: object {id, description, netconfPort} → 202 + task ID
#   POLL   → GET  /api/v1/task/{taskId}                 → {isError, ...}
# =============================================================================

# ── Step 1: Derive existence / UUID / description-match by port ───────────────
- name: "Derive exists / id / desc_match by port  | {{ netconf_config.description }}"
  set_fact:
    _nc_exists:     "{{ netconf_config.netconf_port | string in netconf_port_map }}"
    _nc_id:         "{{ (netconf_port_map.get(netconf_config.netconf_port | string, {})).get('id', '') }}"
    _nc_desc_match: "{{ (netconf_port_map.get(netconf_config.netconf_port | string, {})).get('description', '') == netconf_config.description }}"

- name: "DEBUG | Step 1 — exists={{ _nc_exists }}  id={{ _nc_id }}  desc_match={{ _nc_desc_match }}"
  debug:
    msg:
      desired_description: "{{ netconf_config.description }}"
      desired_port:        "{{ netconf_config.netconf_port }}"
      exists_by_port:      "{{ _nc_exists }}"
      existing_id:         "{{ _nc_id }}"
      description_matches: "{{ _nc_desc_match }}"
  when: catc_debug | default(false) | bool

# =============================================================================
# CREATE — no credential with this port exists in CatC
# =============================================================================

- name: "NETCONF | CREATE  | {{ netconf_config.description }} (port {{ netconf_config.netconf_port }})"
  ansible.builtin.uri:
    url: "https://{{ catc_host }}:{{ catc_port }}/dna/intent/api/v1/global-credential/netconf"
    method: POST
    headers:
      X-Auth-Token: "{{ _catc_token }}"
      Content-Type:  "application/json"
    body_format: json
    body:
      - description: "{{ netconf_config.description }}"
        netconfPort: "{{ netconf_config.netconf_port }}"
    validate_certs: "{{ catc_verify }}"
    status_code: [200, 202]
  register: _nc_create
  when: not _nc_exists

- name: "NETCONF | Poll CREATE task  | {{ netconf_config.description }}"
  ansible.builtin.uri:
    url: "https://{{ catc_host }}:{{ catc_port }}{{ _nc_create.json.response.url }}"
    method: GET
    headers:
      X-Auth-Token: "{{ _catc_token }}"
    validate_certs: "{{ catc_verify }}"
    status_code: 200
  register: _nc_create_task
  until: _nc_create_task.json.response.isError is defined
  retries: 12
  delay: 5
  when: not _nc_exists

- name: "NETCONF | Assert CREATE succeeded  | {{ netconf_config.description }}"
  assert:
    that: not _nc_create_task.json.response.isError
    fail_msg: >-
      NETCONF credential create failed for '{{ netconf_config.description }}':
      {{ _nc_create_task.json.response.failureReason | default('unknown') }}
    success_msg: "NETCONF credential '{{ netconf_config.description }}' created."
  when: not _nc_exists

- name: "NETCONF | Resolve new UUID  | {{ netconf_config.description }}"
  cisco.dnac.global_credential_info:
    credentialSubType: NETCONF
  register: _nc_resolve
  when: not _nc_exists

- name: "NETCONF | Update netconf_port_map after CREATE  | {{ netconf_config.description }}"
  set_fact:
    netconf_port_map: >-
      {%- set ns = namespace(new_id='') -%}
      {%- for cred in _nc_resolve.dnac_response.response | default([]) -%}
        {%- if cred.description == netconf_config.description -%}
          {%- set ns.new_id = cred.id -%}
        {%- endif -%}
      {%- endfor -%}
      {{ netconf_port_map | combine({netconf_config.netconf_port | string: {'id': ns.new_id, 'description': netconf_config.description}}) }}
  when: not _nc_exists

- name: "DEBUG | CREATE result  | {{ netconf_config.description }}"
  debug:
    msg:
      create_status: "{{ _nc_create.status }}"
      task_result:   "{{ _nc_create_task.json.response }}"
  when:
    - catc_debug | default(false) | bool
    - not _nc_exists

# =============================================================================
# UPDATE — port already exists; description differs → rename
# =============================================================================

- name: "NETCONF | UPDATE (rename)  | {{ netconf_config.description }}"
  ansible.builtin.uri:
    url: "https://{{ catc_host }}:{{ catc_port }}/dna/intent/api/v1/global-credential/netconf"
    method: PUT
    headers:
      X-Auth-Token: "{{ _catc_token }}"
      Content-Type:  "application/json"
    body_format: json
    body:
      id:          "{{ _nc_id }}"
      description: "{{ netconf_config.description }}"
      netconfPort: "{{ netconf_config.netconf_port }}"
    validate_certs: "{{ catc_verify }}"
    status_code: [200, 202]
  register: _nc_update
  when:
    - _nc_exists
    - not _nc_desc_match

- name: "NETCONF | Poll UPDATE task  | {{ netconf_config.description }}"
  ansible.builtin.uri:
    url: "https://{{ catc_host }}:{{ catc_port }}{{ _nc_update.json.response.url }}"
    method: GET
    headers:
      X-Auth-Token: "{{ _catc_token }}"
    validate_certs: "{{ catc_verify }}"
    status_code: 200
  register: _nc_update_task
  until: _nc_update_task.json.response.isError is defined
  retries: 12
  delay: 5
  when:
    - _nc_exists
    - not _nc_desc_match

- name: "NETCONF | Assert UPDATE succeeded  | {{ netconf_config.description }}"
  assert:
    that: not _nc_update_task.json.response.isError
    fail_msg: >-
      NETCONF credential update failed for '{{ netconf_config.description }}':
      {{ _nc_update_task.json.response.failureReason | default('unknown') }}
    success_msg: "NETCONF credential '{{ netconf_config.description }}' updated."
  when:
    - _nc_exists
    - not _nc_desc_match

# =============================================================================
# IDEMPOTENT — port exists, description already matches
# =============================================================================

- name: "NETCONF | Already up-to-date  | {{ netconf_config.description }}"
  debug:
    msg: >-
      NETCONF credential '{{ netconf_config.description }}'
      (port {{ netconf_config.netconf_port }}) already exists with matching
      description — no action needed.
  when:
    - _nc_exists
    - _nc_desc_match
